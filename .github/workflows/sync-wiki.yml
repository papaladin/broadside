name: Sync Wiki with Repo

on:
  push:
    branches: [ main ]
    paths:
      - '**.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone wiki repo
        run: |
          git clone https://x-access-token:${{ secrets.WIKI_PAT }}@github.com/papaladin/broadside.wiki.git wiki
          cd wiki
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Copy .md files to wiki
        run: |
          # Wiki homepage & sidebar
          cp docs/Home.md wiki/Home.md
          cp docs/_Sidebar.md wiki/_Sidebar.md 2>/dev/null || true

          # Player & developer guides
          cp docs/player_guide.md wiki/player_guide.md
          cp docs/changelog.md wiki/changelog.md          # <-- ADDED

          # Architecture & specs
          cp docs/architecture.md wiki/architecture.md
          cp docs/specs_data.md wiki/specs_data.md
          cp docs/specs_logic.md wiki/specs_logic.md
          cp docs/specs_engine.md wiki/specs_engine.md
          cp docs/specs_generators.md wiki/specs_generators.md
          cp docs/specs_jsx.md wiki/specs_jsx.md        # <-- ADDED
          cp docs/specs_storage.md wiki/specs_storage.md # <-- ADDED

          # Roadmap
          cp docs/roadmap.md wiki/roadmap.md

          # Tasks files are intentionally NOT synced

      - name: Commit and push to wiki
        run: |
          cd wiki
          git add .
          git commit -m "Sync docs from repo (${{ github.sha }})" || true
          git push origin HEAD
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Broadside — Screenshot Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1622;color:#e2d6be;font-family:Georgia,'Times New Roman',serif;font-size:12px;padding:20px}
h1{color:#c9aa6e;font-size:22px;letter-spacing:.15em;margin-bottom:4px;text-align:center}
h2{color:#c9aa6e;font-size:16px;margin:30px 0 10px;border-bottom:1px solid #5a4a32;padding-bottom:6px}
.subtitle{color:#b0a48c;font-size:11px;margin-bottom:20px;text-align:center}
nav{text-align:center;margin:16px 0 30px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
nav a{color:#c9aa6e;text-decoration:none;padding:6px 14px;border:1px solid #5a4a32;border-radius:3px;font-size:11px;font-family:inherit}
nav a:hover{background:#1c3450}
.export-all{background:#c9aa6e;border:1px solid #dfc080;color:#000;padding:10px 24px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:bold;display:block;margin:0 auto 20px}
.export-all:hover{background:#dfc080}
.size-block{display:inline-flex;flex-direction:column;align-items:center;gap:6px;margin:0 12px 16px 0;vertical-align:top}
.size-label{color:#b0a48c;font-size:10px}
.export-btn{background:#221d16;border:1px solid #5a4a32;color:#c9aa6e;padding:4px 10px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:10px}
.export-btn:hover{background:#2a1a08}
.scene{overflow:hidden;position:relative}
.scene *{font-family:Georgia,'Times New Roman',serif}
</style>
</head>
<body>
<h1>Broadside Screenshot Generator</h1>
<div class="subtitle">Dev tool for itch.io assets</div>
<button class="export-all" onclick="exportAll()">Export All</button>
<nav><a href="#sceneA">Cover</a><a href="#sceneB">Log</a><a href="#sceneC">Combat</a><a href="#sceneD">Port</a><a href="#sceneE">Crew</a><a href="#sceneF">F: itch.io Assets</a></nav>
<script>window.E=window.E||{A:{},_reducers:[]};window.S=window.S||{};window.L=window.L||{};window.G=window.G||{};</script>
<script src="../data.js"></script>
<div id="scenes"></div>
<script>
const D = window.D;
// Use the game's real theme if UI loaded, else fallback to current hard-coded equivalent
const T = (window.UI && window.UI.T) || {
  bg:"#0a1622", panel:"#221d16", border:"#5a4a32", borderFaint:"#3e3222",
  text:"#e2d6be", textDim:"#b0a48c", textFaint:"#706050",
  gold:"#c9aa6e", goldDim:"#96784a", goldBr:"#dfc080",
  green:"#6a9a5a", greenBr:"#7ab868", red:"#b85a4a", redBr:"#d06a58",
  blue:"#5a8aaa", blueBr:"#6a9aba", purple:"#8a5a9a", purpleBr:"#9a6aaa",
  font: "Georgia, 'Times New Roman', serif",
};

const FC = D.FACTIONS; // key -> {label, color}
const SIZES=[{w:315,h:250,l:"315x250"},{w:630,h:500,l:"630x500"},{w:1280,h:640,l:"1280x640"}];

function exportScene(id,fn){ const el=document.getElementById(id); if(!el)return; html2canvas(el,{backgroundColor:null,scale:2}).then(c=>{ const a=document.createElement("a"); a.download=fn; a.href=c.toDataURL("image/png"); a.click(); }) }
async function exportAll(){ for(const b of document.querySelectorAll(".export-btn")){ b.click(); await new Promise(r=>setTimeout(r,600)); } }
const o=document.getElementById("scenes"); let h="";

// ── SCENE A ─ Cover ──────────────────────────────────────────────────
h+=`<div id="sceneA"><h2>Scene A — Cover</h2>`;
SIZES.forEach((sz,si)=>{
  const id=`sA${si}`;
  const ts=sz.w>=1000?48:sz.w>=500?36:24;
  const ss=sz.w>=1000?20:sz.w>=500?15:12;
  const tg=sz.w>=1000?13:sz.w>=500?10:0;
  const an=sz.w>=1000?60:sz.w>=500?44:28;
  const dt=sz.w>=1000?8:sz.w>=500?6:4;
  h+=`<div class="size-block"><div class="size-label">${sz.l}</div><div class="scene" id="${id}" style="width:${sz.w}px;height:${sz.h}px;background:${T.bg};display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative">`;
  h+=`<svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.04" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice"><path d="M50,80 Q80,60 120,70 T180,65 Q200,60 220,68 T280,62 Q310,55 340,65 T380,70" fill="none" stroke="${T.gold}" stroke-width="1.5"/><path d="M60,100 Q90,90 130,95 T190,88 Q220,85 250,92 T310,87 Q340,82 370,90" fill="none" stroke="${T.gold}" stroke-width="1"/><ellipse cx="160" cy="90" rx="8" ry="4" fill="${T.gold}" opacity="0.3"/><ellipse cx="250" cy="78" rx="12" ry="5" fill="${T.gold}" opacity="0.2"/></svg>`;
  h+=`<div style="position:absolute;inset:8px;border:1px solid ${T.border};border-radius:4px"></div>`;
  h+=`<svg width="${an}" height="${an}" viewBox="0 0 40 40" style="margin-bottom:${sz.w>=500?12:6}px;opacity:0.7;z-index:1"><circle cx="20" cy="20" r="18" fill="none" stroke="${T.gold}" stroke-width="0.8" opacity="0.4"/><polygon points="20,4 22,16 20,14 18,16" fill="${T.gold}" opacity="0.8"/><polygon points="20,36 22,24 20,26 18,24" fill="${T.goldDim}" opacity="0.5"/><polygon points="4,20 16,18 14,20 16,22" fill="${T.goldDim}" opacity="0.5"/><polygon points="36,20 24,18 26,20 24,22" fill="${T.goldDim}" opacity="0.5"/><text x="20" y="9" text-anchor="middle" font-size="4" fill="${T.textDim}" font-family="serif">N</text></svg>`;
  h+=`<div style="color:${T.gold};font-size:${ts}px;font-weight:bold;letter-spacing:0.2em;text-shadow:0 0 30px ${T.goldDim};z-index:1">&#9875; BROADSIDE</div>`;
  h+=`<div style="color:${T.textDim};font-size:${ss}px;letter-spacing:0.15em;margin-top:${sz.w>=500?8:4}px;z-index:1">CARIBBEAN &middot; 1695</div>`;
  if(tg>0) h+=`<div style="color:${T.textFaint};font-size:${tg}px;margin-top:${sz.w>=1000?16:10}px;z-index:1;font-style:italic">A turn-based, narrative pirate strategy game</div>`;
  h+=`<div style="position:absolute;bottom:${sz.w>=500?16:8}px;display:flex;gap:${dt}px;z-index:1">`;
  Object.values(FC).forEach(f=>{ h+=`<div style="width:${dt}px;height:${dt}px;border-radius:50%;background:${f.color};opacity:0.6"></div>`; });
  h+=`</div></div><button class="export-btn" onclick="exportScene('${id}','broadside-cover-${sz.l}.png')">Export ${sz.l}</button></div>`;
});
h+=`</div>`;

// ── SCENE B ─ Captain's Log ──────────────────────────────────────────
h+=`<div id="sceneB"><h2>Scene B — Captain's Log</h2>`;
const logEntries = [
  { day:47, text:"Arrived at Havana.", icon:"⚓" },
  { day:47, text:"\"Soldiers patrol the docks. The garrison has been reinforced.\"", icon:"🗣", dim:true },
  { day:48, text:"Accepted mission: Hunt down The Scarlet Fortune.", icon:"📜" },
  { day:50, text:"A squall hits without warning! The ship takes damage.", icon:"🌊" },
  { day:50, text:"Pedro García was lost in the storm.", icon:"⚠" },
  { day:52, text:"The Scarlet Fortune strikes her colours. Victory!", icon:"⚔" },
  { day:52, text:"Lost crew: Henri Dubois, Cornelis de Vries.", icon:"⚠" },
  { day:52, text:"Maria Navarro is disturbed by the attack on Spanish ships.", icon:"⚠" },
  { day:53, text:"Made port at Tortuga. The crew is glad to see land.", icon:"⚓" },
  { day:53, text:"Completed: Hunt down The Scarlet Fortune. +375g, +2 fame.", icon:"✅" },
  { day:53, text:"Sold 3 Rum for 99g.", icon:"💰" },
  { day:53, text:"Bought 5 Sugar for 210g.", icon:"💰" },
  { day:53, text:"Bought drinks for the crew: -50g. Morale +5.", icon:"🍻" },
  { day:53, text:"Willem de Boer joins the crew as carpenter.", icon:"👥" },
];
SIZES.forEach((sz,si)=>{
  const id=`sB${si}`;
  const fs=sz.w>=1000?13:sz.w>=500?11:9;
  const p=sz.w>=1000?20:sz.w>=500?14:8;
  const lh=sz.w>=1000?26:sz.w>=500?20:15;
  const mx=sz.h<300?7:sz.w>=1000?14:10;
  h+=`<div class="size-block"><div class="size-label">${sz.l}</div><div class="scene" id="${id}" style="width:${sz.w}px;height:${sz.h}px;background:${T.bg};padding:${p}px;display:flex;flex-direction:column">`;
  h+=`<div style="color:${T.gold};font-size:${fs+2}px;font-weight:bold;margin-bottom:${p/2}px;letter-spacing:0.08em">📖 CAPTAIN'S LOG</div>`;
  h+=`<div style="background:${T.panel};border:1px solid ${T.border};border-radius:4px;padding:${p-2}px;flex:1;overflow:hidden">`;
  let lastDay=-1;
  logEntries.slice(0,mx).forEach(e=>{
    const showDay = e.day !== lastDay;
    lastDay = e.day;
    const color = e.dim ? T.textDim : T.text;
    h+=`<div style="display:flex;align-items:baseline;margin-bottom:${lh*0.15}px;font-size:${fs}px;line-height:${lh}px">`;
    h+=`<span style="width:${fs+4}px;flex-shrink:0;color:${T.textDim}">${e.icon}</span>`;
    h+=`<span style="flex:1;color:${color};${e.dim?'font-style:italic;':''}">${e.text}</span>`;
    if(showDay) h+=`<span style="color:${T.textFaint};font-size:${fs-2}px;margin-left:8px;flex-shrink:0">Day ${e.day}</span>`;
    h+=`</div>`;
  });
  h+=`</div></div><button class="export-btn" onclick="exportScene('${id}','broadside-log-${sz.l}.png')">Export ${sz.l}</button></div>`;
});
h+=`</div>`;

// ── SCENE C ─ Combat ──────────────────────────────────────────────────
h+=`<div id="sceneC"><h2>Scene C — Combat</h2>`;
SIZES.forEach((sz,si)=>{
  const id=`sC${si}`;
  const p=sz.w>=1000?20:sz.w>=500?12:8;
  const fs=sz.w>=1000?13:sz.w>=500?11:9;
  const bh=sz.w>=500?10:6;
  h+=`<div class="size-block"><div class="size-label">${sz.l}</div><div class="scene" id="${id}" style="width:${sz.w}px;height:${sz.h}px;background:${T.bg};padding:${p}px;display:flex;flex-direction:column;gap:${p/2}px">`;
  h+=`<div style="text-align:center;color:${T.redBr};font-size:${fs+3}px;font-weight:bold;letter-spacing:0.1em">⚔ NAVAL BATTLE — ROUND 4</div>`;
  h+=`<div style="display:flex;gap:${p}px;flex:1">`;
  // Player ship
  h+=`<div style="flex:1;background:${T.panel};border:1px solid ${T.blueBr};border-radius:4px;padding:${p-2}px"><div style="color:${T.blueBr};font-size:${fs}px;margin-bottom:4px;font-weight:bold">⚓ The Cartographer's Folly</div><div style="color:${T.textDim};font-size:${fs-2}px;margin-bottom:6px">Brigantine · 12 crew · 15 cannons</div><div style="color:${T.textDim};font-size:${fs-2}px;margin-bottom:2px">Hull: 98 / 150</div><div style="background:${T.borderFaint};border-radius:3px;overflow:hidden;height:${bh}px"><div style="width:65%;height:100%;background:${T.greenBr};border-radius:3px"></div></div>${sz.w>=500?`<div style="margin-top:6px;display:flex;gap:4px"><span style="color:${T.blueBr};font-size:${fs-2}px;background:${T.blueBr}20;border:1px solid ${T.blueBr};padding:1px 4px;border-radius:2px">Reinforced Hull</span><span style="color:${T.blueBr};font-size:${fs-2}px;background:${T.blueBr}20;border:1px solid ${T.blueBr};padding:1px 4px;border-radius:2px">Extra Cannons</span></div>`:''}</div>`;
  h+=`<div style="display:flex;align-items:center;color:${T.redBr};font-size:${sz.w>=500?22:14}px">⚡</div>`;
  // Enemy ship
  h+=`<div style="flex:1;background:${T.panel};border:1px solid ${T.red};border-radius:4px;padding:${p-2}px"><div style="color:${T.redBr};font-size:${fs}px;margin-bottom:4px;font-weight:bold">The Scarlet Fortune</div><div style="color:${T.textDim};font-size:${fs-2}px;margin-bottom:6px">Spanish Frigate · 18 crew · 20 cannons</div><div style="color:${T.textDim};font-size:${fs-2}px;margin-bottom:2px">Hull: 42 / 120</div><div style="background:${T.borderFaint};border-radius:3px;overflow:hidden;height:${bh}px"><div style="width:35%;height:100%;background:${T.redBr};border-radius:3px"></div></div>${sz.w>=500?`<div style="margin-top:6px"><span style="color:${FC.spanish.color};font-size:${fs-2}px;background:${FC.spanish.color}20;border:1px solid ${FC.spanish.color};padding:1px 4px;border-radius:2px">Spanish</span></div>`:''}</div></div>`;
  // Combat log
  if(sz.h>300){
    h+=`<div style="background:${T.bgDeep||'#060e14'};border:1px solid ${T.borderFaint};border-radius:4px;padding:${p-4}px;font-size:${fs-1}px;max-height:${sz.h*0.18}px;overflow:hidden">`;
    h+=`<div style="color:${T.gold};margin-bottom:3px">⚓ Your broadside tears into the enemy hull. -18 damage.</div>`;
    h+=`<div style="color:${T.redBr};margin-bottom:3px">💥 The enemy answers with precision fire. -12 damage.</div>`;
    h+=`<div style="color:${T.redBr}">👥 Lost crew: François Bonnet.</div>`;
    h+=`</div>`;
  }
  // Action buttons
  h+=`<div style="display:flex;gap:${p/2}px;justify-content:center;flex-wrap:wrap">`;
  [["🔥 Broadside","Full cannon volley"],["🎯 Precision","Aimed shot"],["⚔ Grapple","Board them"],["💨 Evade","Flee the battle"]].forEach(([l,d])=>{
    h+=`<div style="background:${T.panel};border:1px solid ${T.border};border-radius:4px;padding:${p/2}px ${p}px;text-align:center;flex:1;min-width:${sz.w>=1000?140:sz.w>=500?100:55}px"><div style="color:${T.text};font-size:${fs}px;font-weight:bold">${l}</div>${sz.w>=500?`<div style="color:${T.textDim};font-size:${fs-2}px">${d}</div>`:''}</div>`;
  });
  h+=`</div></div><button class="export-btn" onclick="exportScene('${id}','broadside-combat-${sz.l}.png')">Export ${sz.l}</button></div>`;
});
h+=`</div>`;

// ── SCENE D ─ Port ────────────────────────────────────────────────────
h+=`<div id="sceneD"><h2>Scene D — Port</h2>`;
const gossip = [
  "The harbourmaster checks papers more carefully than usual. Extra soldiers loiter near the quay.",
  "A merchant claims Spices sell well at Curaçao. He seems unreliable.",
  "Children point at your flag. Sailors trade stories about you, and some of them are true.",
];
SIZES.forEach((sz,si)=>{
  const id=`sD${si}`;
  const p=sz.w>=1000?20:sz.w>=500?12:8;
  const fs=sz.w>=1000?13:sz.w>=500?11:9;
  h+=`<div class="size-block"><div class="size-label">${sz.l}</div><div class="scene" id="${id}" style="width:${sz.w}px;height:${sz.h}px;background:${T.bg};padding:${p}px;display:flex;flex-direction:column;gap:${p/2}px">`;
  h+=`<div style="background:${T.panel};border:1px solid ${T.border};border-radius:4px;padding:${p}px"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div><div style="color:${T.gold};font-size:${fs+4}px;font-weight:bold">⚓ Tortuga</div><div style="color:${FC.pirate.color};font-size:${fs-1}px;letter-spacing:0.1em">PIRATE PORT</div></div><span style="color:${T.greenBr};font-size:${fs-1}px;background:${T.greenBr}20;border:1px solid ${T.greenBr};padding:2px 6px;border-radius:3px">Allied (82)</span></div>${sz.w>=500?`<p style="color:${T.textDim};font-size:${fs-1}px;line-height:1.5">A lawless haven for pirates and buccaneers. The most notorious port in the Caribbean.</p>`:''}</div>`;
  h+=`<div style="background:${T.bgDeep||'#060e14'};border:1px solid ${T.borderFaint};border-radius:4px;padding:${p}px"><div style="color:${T.textDim};font-size:${fs-2}px;margin-bottom:6px;letter-spacing:0.08em">🗣 WORD ON THE DOCKS</div>`;
  gossip.forEach(l=>{ h+=`<p style="color:${T.textDim};font-size:${fs-1}px;margin-bottom:5px;line-height:1.5;font-style:italic">“${l}”</p>`; });
  h+=`</div>`;
  if(sz.h>300){
    h+=`<div style="display:flex;gap:${p/2}px;flex-wrap:wrap">`;
    ["🗺 World Map","📊 Status","📦 Market","⚓ Shipyard","👥 Crew","📖 Journal"].forEach(l=>{ h+=`<div style="background:${T.panel};border:1px solid ${T.border};padding:4px 8px;border-radius:3px;color:${T.gold};font-size:${fs-1}px">${l}</div>`; });
    h+=`</div>`;
  }
  if(sz.h>400){
    h+=`<div style="background:${T.panel};border:1px solid ${T.border};border-radius:4px;padding:${p-2}px;flex:1;overflow:hidden"><div style="color:${T.gold};font-size:${fs-1}px;margin-bottom:4px;font-weight:bold;letter-spacing:0.08em">MISSION BOARD</div><div style="background:${T.panelAlt||'#1a1510'};border:1px solid ${T.borderFaint};border-radius:3px;padding:${p-4}px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="color:${T.text};font-size:${fs}px;font-weight:bold">Escort the merchant convoy to Martinique</span><div style="display:flex;gap:3px"><span style="display:inline-block;padding:2px 6px;border-radius:3px;font-size:8px;border:1px solid ${FC.pirate.color};color:${FC.pirate.color}">Pirate</span><span style="display:inline-block;padding:2px 6px;border-radius:3px;font-size:8px;border:1px solid ${T.green};color:${T.green}">low</span></div></div><p style="color:${T.textDim};font-size:${fs-2}px;margin-bottom:4px;font-style:italic">The Brotherhood needs safe passage. Keep the convoy intact.</p><div style="display:flex;gap:10px;font-size:${fs-1}px"><span style="color:${T.gold}">💰 425g</span><span style="color:${T.blueBr}">★ +1</span><span style="color:${T.textDim}">→ Martinique</span></div></div></div>`;
  }
  h+=`</div><button class="export-btn" onclick="exportScene('${id}','broadside-port-${sz.l}.png')">Export ${sz.l}</button></div>`;
});
h+=`</div>`;

// ── SCENE E ─ Crew ─────────────────────────────────────────────────────
h+=`<div id="sceneE"><h2>Scene E — Crew</h2>`;
const crew = [
  { name:"Juan Rodríguez", faction:"spanish", role:"gunner", days:147, tags:["veteran","scar_battle","scar_storm","revealed_drunkard"], bio:"Juan is a veteran of 147 days. The crew looks up to them. They survived a deadly battle and a violent storm. Has a fondness for the bottle." },
  { name:"Katherine Brown", faction:"english", role:"navigator", days:203, tags:["loyal","scar_battle","scar_shipwreck"], bio:"Katherine has served 203 days. This ship is their life now. Loyal to the ship and the captain. They will never leave." },
  { name:"Calico Rackham", faction:"pirate", role:"deckhand", days:34, tags:["mutineer","scar_shipwreck"], bio:"Calico, the Pirate deckhand, has been here 34 days. Survived a shipwreck. Was part of a mutiny once." },
  { name:"Marie Fontaine", faction:"french", role:"cook", days:88, tags:["seasoned","revealed_coward"], bio:"Marie is a seasoned hand with 88 days at sea. Not the bravest soul aboard." },
  { name:"Pieter van Dijk", faction:"dutch", role:"carpenter", days:12, tags:[], bio:"Pieter asked about the pay structure before anything else. Time will tell." },
];
const roleIcons = { deckhand:"⚓", gunner:"🗡", cook:"🍖", carpenter:"🔧", navigator:"🧭" };
SIZES.forEach((sz,si)=>{
  const id=`sE${si}`;
  const p=sz.w>=1000?16:sz.w>=500?10:6;
  const fs=sz.w>=1000?12:sz.w>=500?10:8;
  const mc=sz.h<300?3:sz.w>=1000?5:4;
  h+=`<div class="size-block"><div class="size-label">${sz.l}</div><div class="scene" id="${id}" style="width:${sz.w}px;height:${sz.h}px;background:${T.bg};padding:${p}px;display:flex;flex-direction:column;gap:${p/2}px">`;
  h+=`<div style="color:${T.gold};font-size:${fs+3}px;font-weight:bold;letter-spacing:0.08em">👥 CREW MANIFEST</div>`;
  h+=`<div style="color:${T.textDim};font-size:${fs-1}px;margin-bottom:4px">`;
  Object.entries(FC).forEach(([k,f])=>{ h+=`<span style="color:${f.color};margin-right:8px">●</span> ${f.label}: 1 `; });
  h+=`</div>`;
  h+=`<div style="display:flex;flex-direction:column;gap:${p/2}px;flex:1;overflow:hidden">`;
  crew.slice(0,mc).forEach(c=>{
    const fC = FC[c.faction]?.color || T.textDim;
    const roleIcon = roleIcons[c.role] || "👤";
    const tagPills = c.tags.map(tag=>{
      const color = tag==='loyal'?T.greenBr:tag==='mutineer'?T.purpleBr:tag.includes('scar')?T.blueBr:tag.includes('revealed')?T.redBr:T.textDim;
      const label = tag.replace(/^revealed_/,'').replace(/_/g,' ');
      return `<span style="color:${color};font-size:${fs-3}px;background:${color}15;border:1px solid ${color}40;padding:1px 4px;border-radius:2px;margin-right:3px">${label}</span>`;
    }).join('');
    h+=`<div style="background:${T.panel};border:1px solid ${T.border};border-radius:4px;padding:${p}px;display:flex;gap:${p}px;align-items:flex-start">`;
    h+=`<div style="flex-shrink:0;width:${sz.w>=500?200:140}px"><div style="color:${T.text};font-size:${fs+1}px;font-weight:bold">${roleIcon} ${c.name}</div><div style="color:${fC};font-size:${fs-1}px">${FC[c.faction].label} ${c.role} — ${c.days}d</div>${c.tags.length?`<div style="margin-top:3px;display:flex;flex-wrap:wrap">${tagPills}</div>`:''}</div>`;
    if(sz.w>=500) h+=`<div style="flex:1;color:${T.textDim};font-size:${fs-1}px;line-height:1.5;font-style:italic">“${c.bio}”</div>`;
    h+=`</div>`;
  });

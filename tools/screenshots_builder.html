<script>
function exportScene(id, fn) {
  const el = document.getElementById(id);
  if (!el) return;

  // Wait for all images inside this element to be complete
  const imgs = el.querySelectorAll('img');
  const wait = Promise.all(Array.from(imgs).map(img => {
    if (img.complete) return Promise.resolve();
    return new Promise(resolve => {
      img.onload = resolve;
      img.onerror = resolve; // don't block on error
    });
  }));

  wait.then(() => {
    html2canvas(el, {
      backgroundColor: null,
      scale: 2,
      useCORS: true,
      allowTaint: false,   // safer for toDataURL
    }).then(c => {
      const a = document.createElement("a");
      a.download = fn;
      a.href = c.toDataURL("image/png");
      a.click();
    }).catch(err => console.error("Export failed:", err));
  });
}
</script>

        <div style={{color:T.textFaint, fontSize:12, marginTop:14, fontStyle:"italic"}}>
          A turn-based, narrative pirate strategy game
        </div>
      </div>
      <div style={{position:"absolute", bottom:14, left:0, right:0,
        display:"flex", gap:6, justifyContent:"center", zIndex:1}}>
        {Object.values(FC).map((f, i) => (
          <div key={i} style={{width:6, height:6, borderRadius:"50%",
            background:f.color, opacity:0.6}} />
        ))}
      </div>
    </SceneBox>
  );

  const SceneFBackground = ({ sid }) => (
    <SceneBox id={sid} w={1920} h={1080}>
      <svg style={{position:"absolute", inset:0, width:"100%", height:"100%", opacity:0.03}}
           viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">
        <path d="M50,80 Q80,60 120,70 T180,65 Q200,60 220,68 T280,62 Q310,55 340,65 T380,70"
              fill="none" stroke={T.gold} strokeWidth="1.5" />
        <path d="M60,100 Q90,90 130,95 T190,88 Q220,85 250,92 T310,87 Q340,82 370,90"
              fill="none" stroke={T.gold} strokeWidth="1" />
        <ellipse cx="160" cy="90" rx="8" ry="4" fill={T.gold} opacity="0.3" />
        <ellipse cx="250" cy="78" rx="12" ry="5" fill={T.gold} opacity="0.2" />
      </svg>
    </SceneBox>
  );

  const SceneFEmbed = ({ sid }) => (
    <SceneBox id={sid} w={640} h={480}>
      <svg style={{position:"absolute", inset:0, width:"100%", height:"100%", opacity:0.04}}
           viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">
        <path d="M50,80 Q80,60 120,70 T180,65 Q200,60 220,68 T280,62 Q310,55 340,65 T380,70"
              fill="none" stroke={T.gold} strokeWidth="1.5" />
        <path d="M60,100 Q90,90 130,95 T190,88" fill="none" stroke={T.gold} strokeWidth="1" />
      </svg>
      <div style={{position:"absolute", inset:8, border:`1px solid ${T.border}`, borderRadius:4}} />
      <div style={{position:"absolute", inset:0, display:"flex",
        flexDirection:"column", alignItems:"center", justifyContent:"center", zIndex:1}}>
        <div style={{marginBottom:10}}><IconAnchor size={44} color={T.gold} /></div>
        <div style={{color:T.gold, fontSize:36, fontWeight:"bold",
          letterSpacing:"0.2em", textShadow:`0 0 30px ${T.goldDim}`}}>BROADSIDE</div>
        <div style={{color:T.textDim, fontSize:15, letterSpacing:"0.15em",
          marginTop:6}}>CARIBBEAN · 1695</div>
        <div style={{color:T.textFaint, fontSize:10, marginTop:12, fontStyle:"italic"}}>
          A turn-based, narrative pirate strategy game
        </div>
      </div>
      <div style={{position:"absolute", bottom:12, left:0, right:0,
        display:"flex", gap:5, justifyContent:"center", zIndex:1}}>
        {Object.values(FC).map((f, i) => (
          <div key={i} style={{width:5, height:5, borderRadius:"50%",
            background:f.color, opacity:0.6}} />
        ))}
      </div>
    </SceneBox>
  );

  const SizeBlock = ({ label, exportName, sid, children }) => (
    <div className="size-block">
      <div className="size-label">{label}</div>
      {children}
      <button className="export-btn" onClick={() => exportScene(sid, exportName)}>
        Export {label}
      </button>
    </div>
  );

  const Page = () => (
    <>
      <div id="sceneA">
        <SectionHeader>Scene A — Cover</SectionHeader>
        {SIZES.map((sz, i) => (
          <SizeBlock key={i} label={sz.l} sid={`sA${i}`}
            exportName={`broadside-cover-${sz.l}.png`}>
            <SceneA size={sz} sid={`sA${i}`} />
          </SizeBlock>
        ))}
      </div>

      <div id="sceneB">
        <SectionHeader>Scene B — Captain's Log</SectionHeader>
        {SIZES.map((sz, i) => (
          <SizeBlock key={i} label={sz.l} sid={`sB${i}`}
            exportName={`broadside-log-${sz.l}.png`}>
            <SceneB size={sz} sid={`sB${i}`} />
          </SizeBlock>
        ))}
      </div>

      <div id="sceneC">
        <SectionHeader>Scene C — Combat (with real ship sprites)</SectionHeader>
        {SIZES.map((sz, i) => (
          <SizeBlock key={i} label={sz.l} sid={`sC${i}`}
            exportName={`broadside-combat-${sz.l}.png`}>
            <SceneC size={sz} sid={`sC${i}`} />
          </SizeBlock>
        ))}
      </div>

      <div id="sceneD">
        <SectionHeader>Scene D — Port (with silhouette)</SectionHeader>
        {SIZES.map((sz, i) => (
          <SizeBlock key={i} label={sz.l} sid={`sD${i}`}
            exportName={`broadside-port-${sz.l}.png`}>
            <SceneD size={sz} sid={`sD${i}`} />
          </SizeBlock>
        ))}
      </div>

      <div id="sceneE">
        <SectionHeader>Scene E — Crew</SectionHeader>
        {SIZES.map((sz, i) => (
          <SizeBlock key={i} label={sz.l} sid={`sE${i}`}
            exportName={`broadside-crew-${sz.l}.png`}>
            <SceneE size={sz} sid={`sE${i}`} />
          </SizeBlock>
        ))}
      </div>

      <div id="sceneF">
        <SectionHeader>Scene F — itch.io Page Assets</SectionHeader>
        <SizeBlock label="Banner 960×480" sid="sF0"
          exportName="broadside-banner-960x480.png">
          <SceneFBanner sid="sF0" />
        </SizeBlock>
        <SizeBlock label="Background 1920×1080" sid="sF1"
          exportName="broadside-background-1920x1080.png">
          <SceneFBackground sid="sF1" />
        </SizeBlock>
        <SizeBlock label="Embed BG 640×480" sid="sF2"
          exportName="broadside-embed-640x480.png">
          <SceneFEmbed sid="sF2" />
        </SizeBlock>
      </div>
    </>
  );

  ReactDOM.createRoot(document.getElementById('scenes-root'))
    .render(<Page />);
});
</script>

</body>

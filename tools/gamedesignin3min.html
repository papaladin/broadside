<script>
const TOPICS_RAW = [
{"id":"core-loop","cat":"Foundations","icon":"🔄","title":"The Core Loop","tag":"The heartbeat of every game","c30s":{"h":"Every game is a loop. Great games are nested loops.","b":"The player perceives, decides, acts, and receives feedback — then repeats. These loops nest: micro-actions (matching gems in Candy Crush, 2 seconds) inside session goals (clearing a level, 3 minutes) inside long arcs (unlocking new worlds, days). If any loop in the chain isn't satisfying on its own, no amount of content or polish will save the game."},"c3m":{"intro":"The core loop is gameplay's smallest repeating unit — the one thing designers spend most of their time refining.","sec":[["The Four Steps","Every loop flows through: perceive the game state, decide on an action, execute it, receive feedback. This cycle lasts 200ms in Street Fighter or 30 minutes in Civilization — the structure is always the same."],["Loops Within Loops","Micro-loops nest inside macro-loops. In Fortnite: pull trigger (0.5s) → win fight (2–5 min) → win match (20 min) → complete battle pass (weeks). In Candy Crush: match gems (2s) → clear level (3 min) → unlock new world (days). Each layer feeds the motivation for the one above it."],["Where the Loop Lives or Dies","The feedback step determines everything. Mario's coin sound is instant gratification. Candy Crush's cascading animations celebrate every match. Weak feedback makes loops feel broken even when the mechanic is correct."],["The Alignment Principle","A great micro-loop loses power if macro rewards feel arbitrary. A compelling meta arc can't rescue a frustrating core action. Every small win should feel like progress toward something larger."],["Common Pitfalls","Designing rewards before the loop is fun. Building meta-arcs that outlast patience. Breaking the loop with friction — forced menus, unskippable cutscenes, loading screens between action and feedback."]],"ex":"Tetris micro-loop: see piece → pick placement → drop → lines clear. 40 years old, still satisfying. Call of Duty: pull trigger → earn killstreak → win match → rank up. Each ring is independently satisfying.","try":"Pick any game you played recently. Identify the micro-loop (every few seconds) and the macro-loop (keeps you coming back). If the micro-loop isn't fun on its own, no reward structure will save it."},"c30m":{"insight":"The loop is the game. Everything else is decoration.","intro":"The core loop is the most studied concept in game design. It appears in every GDC talk and design doc — yet designers still ship broken loops disguised by beautiful art.","sec":[["Origins","The game loop concept was formalized through MDA (Hunicke et al., 2004) and Jesse Schell's The Art of Game Design. Tetris, released in 1984, is a masterclass in loop design that predates the theory by decades."],["Full Loop Anatomy","A complete loop: the action feels good, feedback arrives quickly (under 100ms feels instant, over 500ms feels sluggish), outcome is clear, motivation to repeat is intrinsic. When all four align, the loop generates its own momentum."],["Loop Stacking","Most successful games run 3–5 nested loops. Fortnite: trigger pull (0.5s) → fight win (2–5 min) → match victory (20 min) → battle pass (weeks) → seasonal rank (months). A satisfying micro with hollow macro = great for a week, then empty."],["Flow Theory and the Loop","Csikszentmihalyi's flow is the loop's psychological delivery system. When challenge barely exceeds skill, the loop becomes invisible — the player just plays."],["Compulsion vs Genuine Engagement","Variable reward schedules power loops superficially — the slot machine effect. The test: would the player feel satisfied stopping now? Hades answers brilliantly — dying feels like a chapter break, not a failure."],["The Casual Game Loop","Candy Crush, Wordle, and Angry Birds prove casual loops rival hardcore ones. Wordle's once-a-day constraint creates 24 hours of anticipation. Angry Birds' retry is frictionless."],["Common Mistakes","(1) Designing content before validating the loop. (2) Mistaking novelty for depth. (3) Breaking the loop with friction between action and feedback."]],"takeaway":"Design the loop first. Test it without art or sound. If the core action isn't fun in a grey box, no polish will fix it.","tip":"Build a 5-minute paper prototype with one action and one reaction. Playtest 3 times. Does it feel good in isolation? Does anyone want to repeat it unprompted?"}},
{"id":"mda","cat":"Foundations","icon":"🔺","title":"MDA Framework","tag":"How mechanics become emotions","c30s":{"h":"In chess, the rule that bishops move diagonally is a Mechanic. The fork that traps your queen is a Dynamic. The 'oh no' moment you feel is the Aesthetic.","b":"MDA (Mechanics → Dynamics → Aesthetics) is the most widely used analytical lens in game design. Designers build bottom-up from rules; players experience top-down from feelings. The gap between intent and experience is where design surprises live."},"c3m":{"intro":"Introduced by Hunicke, LeBlanc & Zubek in 2004, MDA gives designers a shared vocabulary for discussing how games work — and why they sometimes don't.","sec":[["The Three Layers","Mechanics are formal rules ('a queen moves in any direction'). Dynamics are emergent behaviors when mechanics interact with players (forks, sacrifices, time pressure). Aesthetics are emotional responses. You can't design Aesthetics directly — only Mechanics, and hope the Dynamics produce the right feelings."],["The Asymmetry","Designers build M→D→A. Players experience A→D→M. A player feels tension first, then identifies the threat, then understands the rule. This reversed perspective is why playtesting is irreplaceable."],["Aesthetic Vocabulary","LeBlanc proposed 8 types: Sensation, Fantasy, Narrative, Challenge, Fellowship, Discovery, Expression, Submission. Most games target 2–3 intentionally. Naming your target gives you a criterion for every design decision."],["Using MDA as a Compass","Every design decision can be tested: does this mechanic move toward or away from the target aesthetic? If your goal is Fellowship but mechanics punish cooperation, MDA helps you diagnose the misalignment."]],"ex":"Settlers of Catan: the Mechanic is resource trading. The Dynamic is tension between cooperation (you need to trade) and competition (you need to win). The Aesthetic is the social drama of negotiation.","try":"Pick a game you love. Name its top 2 Mechanics, the most interesting Dynamic they create, and the Aesthetic the designers intended. Ask a friend — the gaps between your answers are illuminating."},"c30m":{"insight":"You design rules. Players feel emotions. The chain between them is never as direct as you think.","intro":"MDA is vocabulary, not formula. Two decades after publication, it remains the most referenced framework in game design education.","sec":[["The Original Paper","Hunicke, LeBlanc, and Zubek published their paper based on GDC workshops. Its genius: three layers, one directional chain, and the insight that designers and players traverse it in opposite directions."],["Using MDA as a Designer","When you modify a mechanic, trace the chain. Adding a dodge roll shifts the Dynamic from tanking to weaving, and the Aesthetic from 'power fantasy' toward 'dance.' Every mechanical change has downstream emotional consequences."],["Using MDA as a Critic","Analyze Minecraft: Aesthetics = Discovery + Expression. Dynamics = resource scarcity driving exploration, block placement enabling building. Mechanics = block placement, crafting, inventory. The chain is clean, which is why the game works."],["Limitations","MDA struggles with narrative (cutscenes have no Mechanics), metagame (community behaviors), and platform context (same game feels different on phone vs console). Recognize its blind spots."],["Related Frameworks","Zimmerman & Salen's Rules/Play/Culture, Fullerton's player experience framework, Schell's Elemental Tetrad. Using multiple lenses produces richer analysis than any single one."]],"takeaway":"MDA's greatest value is prediction. Before implementing a mechanic, trace the chain: what Dynamics will emerge? What will players feel?","tip":"Take a board game (Uno, Monopoly, or Settlers of Catan) and map its M→D→A chain. Then play it and note where the actual experience differs from your prediction."}},
{"id":"mechanics","cat":"Foundations","icon":"◈","title":"Core Mechanics","tag":"The verbs players live by","c30s":{"h":"Mechanics are the verbs of your game — the actions players take and their consequences.","b":"Great games build on few expressive mechanics that combine in surprising ways. Chess has 6 piece types. Go has 2 rules. Minecraft has one verb: place and break blocks. The secret isn't more mechanics — it's richer interactions between them."},"c3m":{"intro":"A mechanic is a rule that defines what players can do and what happens when they do it. Not just 'you can jump' — but 'jumping at the right moment crushes enemies below you.'","sec":[["What Is a Mechanic?","An action with consequences. In Mario, jumping isn't just movement — it defeats enemies, reaches platforms, discovers secrets. Without consequences, actions are just buttons."],["The Expressiveness Test","A good mechanic supports multiple strategies. A gun in a stealth game isn't just damage — it's a risk-reward calculation about noise, timing, and exposure. One strategy = a tool. Many strategies = a system."],["Verbs First","List your game's verbs: jump, shoot, craft, trade. Each should interact with at least two others. Crafting that doesn't affect combat is isolated. Isolated verbs are features, not systems."],["Primary vs Secondary","The primary mechanic is what you do most — it must be the most satisfying. In Zelda, combat is primary; puzzle-solving and exploration give it meaning and variety."]],"ex":"Chess has 6 piece types. Go has two rules. Minecraft has one verb. Yet all generate near-infinite complexity from simple interactions.","try":"List every verb in a game you're playing. Circle the primary. Draw lines between verbs that interact. Zero connections = a feature, not a system."},"c30m":{"insight":"The most powerful mechanics are atomic — simple to learn, deep to master.","intro":"Mechanics are the atoms of game design. Understanding how atomic mechanics combine into emergent complexity is the single most important skill in systems design.","sec":[["Atomic Mechanics and Emergence","Chess has 6 pieces, Go has 2 rules, Minecraft has 1 verb. The secret is emergence — simple rules interacting to produce situations no designer planned. The bishop and pawn together create possibilities neither creates alone."],["The Decision Space","Richness equals meaningful choices at any moment. Poker generates thousands of situations from 13 ranks and 4 suits. The goal isn't maximum mechanics — it's combinations richer than their parts."],["Minecraft as Case Study","One verb — place/break blocks — creates: building, survival, exploration, engineering (redstone), and art. Atomic mechanic, nearly infinite decision space. The gold standard for elegance."],["Verbs-First vs World-First","Verbs-first ('what feels good to do?') produces deeper systems. World-first ('what would you do here?') produces stronger narrative. The best games harmonize both."],["Prototyping Before Committing","Never commit from a design doc alone. Mechanics that sound brilliant on paper often play terribly — and simple ones reveal unexpected depth. Prototype first."],["The Elegance Principle","Elegant mechanics generate complexity from simple rules. Inelegant ones need exceptions. If you're writing 'except when…' frequently, simplify the rule and deepen the interaction."]],"takeaway":"A great game needs fewer mechanics than you think. Each one should create decisions that surprise even you.","tip":"Prototype with paper, index cards, or the simplest digital version. Answer one question: does this mechanic create interesting decisions?"}},
{"id":"flow","cat":"Player Psychology","icon":"🌊","title":"Flow State","tag":"The zone where time disappears","c30s":{"h":"Flow is the channel between boredom and anxiety.","b":"When challenge matches skill, players enter deep concentration — time distorts, self-consciousness fades. Csikszentmihalyi called this 'flow.' Games are the most reliable flow-generation machines ever invented."},"c3m":{"intro":"Mihaly Csikszentmihalyi identified flow in 1975 studying surgeons, chess masters, and rock climbers. Games turned out to be the most efficient flow machine ever designed.","sec":[["The Flow Channel","Skill on one axis, challenge on the other. Below the diagonal: boredom. Above: anxiety. The narrow band along it is flow. As players improve, challenge must rise — this is every difficulty curve's foundation."],["The Eight Conditions","Clear goals, immediate feedback, challenge-skill balance, sense of control, loss of self-consciousness, altered time perception, intrinsic reward, deep concentration. Games engineer most simultaneously."],["Flow vs Grind","Grinding produces pseudo-flow closer to trance than engagement. Candy Crush's later levels risk grind; Wordle maintains flow by limiting to one puzzle per day."],["Flow Across Genres","Tetris accelerates to stay ahead of skill. Dark Souls forces engagement at the ceiling. Civilization's 'one more turn' is strategic flow. Even playground tag creates flow — chaser and runner constantly adjust."]],"ex":"Tetris is pure flow engineering: pieces fall faster as you improve, keeping challenge aligned with skill. When you stop thinking and just act — that's flow.","try":"Notice the next time you lose track of time playing. What conditions were present? Clear goal? Immediate feedback? Challenge matching skill?"},"c30m":{"insight":"Flow is not a reward for good design — it IS good design.","intro":"Flow is the most cited and most misapplied concept in game design. Understanding it deeply changes how you think about difficulty, feedback, and pacing.","sec":[["The Original Research","Csikszentmihalyi's Beyond Boredom and Anxiety (1975): the activity doesn't produce flow — the structure does. Games are designed structures, making them the most reliable flow technology ever built."],["Dynamic Difficulty Adjustment","Mario Kart's rubber-band AI gives trailing players better items. Many games adjust difficulty invisibly. The risk: perceived DDA feels like cheating. The best DDA is invisible."],["Flow as Pacing Tool","Sustained high challenge burns out. Strategic valleys — easier sections, exploration, narrative — let skill consolidate. Naughty Dog's pacing docs for The Last of Us map tension across the entire campaign."],["Social Flow","Multiplayer flow depends on matchmaking (ELO from chess, modern MMR). Team flow — a coordinated squad in the zone — is one of gaming's most powerful social experiences."],["Breaking Flow Intentionally","The most memorable moments are deliberate flow breaks — Undertale's revelations, a quiet chapter after intensity. Powerful because they interrupt established rhythm."],["The Casual Flow Problem","Casual games must achieve flow in 2-minute sessions. Angry Birds: immediate clarity and instant retry. Wordle: constrained scope — one puzzle, five minutes max."]],"takeaway":"The flow channel is your difficulty curve's north star. Every decision about challenge, feedback, and pacing should be evaluated against it.","tip":"Watch two players — beginner and experienced — play the same 10-minute section. Map when each looks engaged, frustrated, or bored. The gap is your difficulty tuning problem."}},
{"id":"psychology-motivation","cat":"Player Psychology","icon":"🧠","title":"Player Psychology & Motivation","tag":"Why players play","c30s":{"h":"Players don't play games. They play feelings.","b":"Behind every session is an emotional need: curiosity, competence, connection, or control. The best designers ask 'what should the player feel?' before 'what should they do?' Design for emotions first — mechanics are the delivery system."},"c3m":{"intro":"Player motivation research draws from psychology (Self-Determination Theory) and game-specific models (Bartle, Yee). Understanding why players play is more valuable than understanding what they do.","sec":[["Intrinsic vs Extrinsic","Intrinsic: joy of mastery, curiosity, creativity. Extrinsic: achievements, leaderboards, loot. Danger: extrinsic can crowd out intrinsic (overjustification effect). Players who played for fun start playing for points."],["Self-Determination Theory","Ryan & Deci: Competence (feeling capable), Autonomy (feeling in control), Relatedness (feeling connected). Minecraft satisfies all three. When a game fails on any axis, engagement collapses."],["Bartle's Player Types","Achievers (accumulate), Explorers (discover), Socializers (connect), Killers (dominate). Most players blend types. Knowing your audience's dominant type shapes UI, content, and endgame."],["The Role of Uncertainty","Variable rewards are the most compelling — the next drop might be extraordinary. Same mechanism as slot machines. The power is real; the responsibility is serious."],["Agency and Trust","Players need choices to matter. Telltale's Walking Dead proved the illusion can work — until the player sees through it. Once trust collapses, it doesn't return."]],"ex":"Stardew Valley succeeds because players self-define success — farming, socializing, dungeon-crawling, or decorating. Multiple motivation profiles, same mechanics.","try":"Why do you play your favorite game? Mastery? Social connection? Exploration? Now think of a game you quit — which motivation did it fail?"},"c30m":{"insight":"Understanding why players play is more important than understanding what they do.","intro":"Player motivation is a stack: biological drives at the base, psychological needs in the middle, personal identity at the top. Great games address multiple layers.","sec":[["The Research Canon","Four foundations: Csikszentmihalyi (flow), Deci & Ryan (SDT), Bartle (player types), Nick Yee (empirical clusters). Yee found three clusters — Achievement, Social, Immersion — cutting across Bartle's types."],["SDT in Depth","Autonomy: chosen, not coerced — forced daily logins erode it. Competence: beatable with skill — unfair difficulty erodes it. Relatedness: connection — toxic communities destroy it."],["The Curiosity Loop","Loewenstein's information gap theory: perceived gaps compel closure. Every locked door in Zelda, every fog tile, every daily Wordle puzzle. Master curiosity loops = games players think about when not playing."],["Operant Conditioning and Ethics","Skinner's variable ratio schedules: the next press might pay off. Powers slot machines and loot boxes. Does your use create satisfaction or compulsion? Design for satisfaction, not anxiety."],["Emotional Architecture","Great games have arcs: triumph → challenge → despair → catharsis. A game that only makes you powerful isn't as memorable as one that makes you afraid, humble, and moved."],["Cognitive Load","Too many decisions overwhelms; too few bores. Alternate high-decision (strategy) with low-decision (execution). Civilization masters this through its turn structure."],["Motivation Over Time","Early: curiosity. Mid: mastery. Late: completion and identity. Many games only design for the first 10 hours, leaving mid-game as grind and late-game as emptiness."]],"takeaway":"Design for intrinsic motivation first. A game built on intrinsic satisfaction survives the removal of any extrinsic reward.","tip":"Complete: 'My target player is motivated by ___.' Check every feature against it. Map the emotional arc from first session to hundredth."}},
{"id":"game-feel","cat":"Systems Design","icon":"✨","title":"Game Feel & Juice","tag":"Why pressing the button feels good","c30s":{"h":"Game feel is the reason players say a game 'feels good' without being able to explain why.","b":"It's the weight of Mario's jump, the snap of a Candy Crush cascade, the satisfying 'strike!' in Wii Sports bowling. Before story, before art — does it feel good to press the button? Game feel is the invisible foundation; juice is its amplifier."},"c3m":{"intro":"Steve Swink defined game feel as real-time control of a virtual object, polished enough to feel physical. The difference between responsive and sluggish is often just milliseconds.","sec":[["What Is Game Feel","The tactile sensation of interacting with a game. A responsive game and a sluggish one may have identical mechanics, but one feels alive and the other dead. The difference is often single-digit milliseconds."],["The Mario Jump","Variable height on button hold, mid-air control, 'coyote time' (grace frames after leaving a ledge), 3× Earth gravity on descent. These physics 'lies' make the jump feel more true than real physics would."],["Juice","Exaggerated feedback: screen shake, Candy Crush cascades, Wii Sports bowling strikes. Juice isn't information — it's emotion. It transforms correct mechanics into compelling experiences."],["Input Latency","At 60fps, one frame = 16ms. Players feel lag above ~50ms. Street Fighter players think in frame data. FIFA's responsiveness is debated endlessly. Milliseconds matter."],["The Over-Juicing Trap","When everything shakes and flashes, nothing stands out. Juice must be hierarchical — primary actions get maximum feedback, secondary moderate, ambient minimal."]],"ex":"Compare tapping a match in Candy Crush (cascading animations, sounds, popups) vs a version with no feedback. Same mechanics, completely different experience.","try":"Open any phone game. Tap or swipe — pay attention to the first 0.1 seconds. Sound? Visual? Haptic buzz? That's game feel."},"c30m":{"insight":"Game feel is the foundation layer. If pressing a button doesn't feel satisfying, no amount of content will compensate.","intro":"Game feel sits at the intersection of design, audio, animation, and engineering — one of the few areas where every discipline must genuinely collaborate.","sec":[["Steve Swink's Framework","Game Feel (2008): input, response, context, polish, metaphor, rules. Six dials that affect how a game feels. Tuning each independently lets you isolate what's wrong when something feels off."],["The Physics of Fun","Real physics rarely feels fun. Mario's gravity is 3× Earth. Angry Birds' trajectories are exaggerated. Mario Kart uses invisible assists near edges. 'Realistic' almost never equals 'satisfying.'"],["Juice Taxonomy","Visual (particles, shake, flash), audio (impacts, stingers), haptic (rumble, vibration), temporal (hit-stop, slow-mo). Wii Sports bowling layers all four. Great juice combines at least two categories."],["Frame Data and Competition","Street Fighter players analyze moves in frames (1/60s). A 3-frame startup advantage changes competitive viability. In competitive contexts, game feel IS the game."],["Platform Differences","Touch: no physical resistance, rely on visual/audio. Controller: buttons, triggers, rumble. KB+mouse: precision, no haptics. Each platform needs a different feel strategy."],["The Danger of Over-Juicing","When every action maxes out feedback, nothing feels special. Reserve your biggest juice for your biggest moments. A critical hit must feel different from a normal hit."]],"takeaway":"Game feel is testable in isolation. Build the simplest version of your core action and ask: does pressing this button feel good?","tip":"Build a +1 counter three ways: (1) no feedback, (2) sound + animation, (3) sound + animation + shake + particles. Show all three to someone — their reaction is game feel."}},
{"id":"feedback","cat":"Systems Design","icon":"📡","title":"Feedback Systems","tag":"How games speak to players","c30s":{"h":"Feedback is the game speaking to the player.","b":"Every visual, sound, and number is a message. Good feedback tells what happened, why, and what to do next — within a second. When feedback fails, players feel confused, cheated, or bored, and rarely know why."},"c3m":{"intro":"Feedback systems are the communication layer between mechanics and players. Often the last thing designers think about — and the first thing players notice.","sec":[["Three Feedback Types","Immediate (sound on hit, screen shake). Consequential (health lost, door opened). Narrative ('The enemy retreated!'). Great games layer all three on every significant action."],["Positive vs Negative Loops","Positive amplifies: richer → earn faster (Monopoly snowball). Negative dampens: further behind → more help (Mario Kart blue shell). Their ratio defines power fantasy vs balanced competition."],["Feedback as Teaching","The best tutorials are just good feedback. Pokémon's 'It's super effective!' teaches the type system through play. Enemies telegraphing attacks teach dodging. Teaching through feedback is the core skill."]],"ex":"Pokémon's battles: type messages, HP animations, and sounds tell you exactly what happened — teaching the type system through play, not text.","try":"Play your favorite game with sound off for 5 minutes. What critical info do you lose? That's your audio feedback dependency."},"c30m":{"insight":"The best feedback is invisible — players act on it without realizing they're being taught.","intro":"Feedback design sits at the intersection of UX, audio, visual design, and systems theory — requiring genuine cross-discipline collaboration.","sec":[["Signal vs Noise","Overloaded feedback — too many animations, particles, sounds simultaneously — masks the signal. Players stop reading feedback when parsing cost exceeds benefit."],["Loops in Depth","Monopoly's positive loop (rich get richer) makes games drag. Mario Kart's negative loop keeps every race exciting. Most competitive games need both — positive for stakes, negative for hope."],["Systemic Feedback","In Civilization, a neighbor's military buildup is a warning. In The Sims, an 'uncomfortable' Sim is feedback about your design. In complex games, the state IS the feedback."],["Accessibility Channels","Colorblind players miss color; deaf players miss audio. Solution: multiple channels. Fortnite's visual sound indicators show footstep direction — benefiting everyone in noisy rooms."],["The Power of Silence","Silence is feedback. After a boss dies, music stops. Zelda: Breath of the Wild uses ambient quiet to communicate vastness. Knowing when NOT to provide feedback is equally important."]],"takeaway":"Every feedback should answer: What happened? Good or bad? What next? If it answers none — it's noise. Cut it.","tip":"Play your game with sound off, then squinting. What info survives? One-channel communication fails players who can't access that channel."}},
{"id":"difficulty-balance","cat":"Systems Design","icon":"📈","title":"Difficulty & Balance","tag":"Calibrating challenge for every player","c30s":{"h":"A difficulty curve is a promise. Balance is the feeling of fairness that keeps it.","b":"Too steep: players quit. Too flat: they leave bored. The goal is never 'hard' or 'easy' — it's 'right.' Balance ensures every strategy, player type, and skill level feels the game is fair, legible, and rewarding."},"c3m":{"intro":"Difficulty design isn't about making a game hard. It's about making challenge feel fair, legible, and rewarding at every moment.","sec":[["Three Failure Modes","Flat curves = boredom. Spikes = rage-quits. Walls = slow frustration. The goal: consistent rise with peaks and valleys matching the emotional arc."],["Perceived vs Actual","Perceived difficulty matters more. 'One more try' is an emotion. Visible boss health bars and progress indicators shift perception without touching actual numbers."],["The Feeling of Fairness","A death in Dark Souls feels fair because the enemy telegraphed. Fairness = information before consequence, not equal outcomes."],["Difficulty as Emotional Arc","Starting hard teaches respect (Celeste). Starting easy then escalating = hero's journey. A boss harder than surroundings signals importance."],["Common Pitfalls","Number-tuning instead of design-tuning. Balancing for the average while ignoring extremes. Over-nerfing popular strategies — punishing fun is almost always wrong."]],"ex":"Celeste: each chapter is a self-contained mastery arc. Beginners entering, transformed by the end. Assist Mode ensures accessibility without shame.","try":"Think of a game where you died and kept trying vs one where you died and quit. The difference? Usually information — the first told you why you failed."},"c30m":{"insight":"Difficulty is not a number to tune — it's an experience to design.","intro":"Difficulty is the relationship between demands and capabilities. Balance extends it across all players, strategies, and systems.","sec":[["Skill vs Challenge","Player skill grows fastest when learning, then plateaus. A shipped game has 10–20× skill gap between fastest and slowest players. Calibrating for this range is the core challenge."],["The Nintendo Model","Observe struggle, subtly adjust. Mario Bros. Wii: Super Guide after 8 deaths — optional, preserving agency while offering help."],["Difficulty and Accessibility","Celeste's Assist Mode: slow time, add dashes, toggle invincibility — without shame. The core aesthetic (perseverance) works at any difficulty."],["Playtesting Difficulty","Developers are expert players and terrible calibrators. Only reliable method: structured playtesting with actual target audience."],["Types of Balance","PvE (curve), PvP (counters), economy (resource meaning), progression (reward proportionality). Most complaints = PvE; hardest problems = economy."],["Asymmetric Balance","StarCraft's races, Among Us's roles — balanced through complementary strengths, not similarity. The art: making different things feel equivalent."],["Data vs Intuition","Data shows what players do; intuition tells why. Combine playtesting (qualitative, early) with telemetry (quantitative, late)."]],"takeaway":"Never ship without watching real players at multiple skill levels. Your own experience is the worst predictor of theirs.","tip":"Draw difficulty on a timeline. Mark every spike. Draw the emotional arc you want. Mismatches = revision priorities."}},
{"id":"level-design","cat":"Systems Design","icon":"🗺️","title":"Level Design","tag":"Building spaces that teach and excite","c30s":{"h":"A level is a teacher that never speaks.","b":"Great level design guides without telling, teaches without text, creates memories without cutscenes. Space, light, and architecture are the only tools — and they're enough."},"c3m":{"intro":"Level design is the art of shaping player movement, attention, and emotion through constructed space.","sec":[["The Three Tools","Light draws the eye. Architecture shapes movement. Objects reward attention. A bright corridor ending in a dark room with a glowing chest — the player follows the light, no waypoint needed."],["Teach, Test, Twist","Mario's World 1-1 teaches running, jumping, enemies, coins — no text. The pattern: introduce safely, repeat with danger, surprising final test."],["Landmarks and Navigation","Players navigate by landmarks, not maps. Zelda: Breath of the Wild's landmarks are visible across the map. Without landmarks: 'grey corridor syndrome' — lost even with a minimap."]],"ex":"Super Mario Bros. World 1-1 teaches the game's vocabulary in 40 seconds without a word. That's level design at its finest.","try":"In the next game you play, notice what draws your eye entering a new area. Light? Color? Movement? That's level design guiding you."},"c30m":{"insight":"Great levels are stories told through space — every corridor, room, and vista has purpose.","intro":"Level design is one of the few disciplines where knowledge is tribal — passed through practice rather than formal education.","sec":[["Spatial Grammar","Corridors (tension), rooms (pause/choice), open areas (freedom/exposure), vertical space (power/tactical advantage). Reading this grammar is the core of the craft."],["The Promised Land","Show where they're going before they get there. Zelda: BotW shows Hyrule Castle from the first plateau. Forward momentum + reduced anxiety."],["Pacing Through Space","Tight corridors = tension. Open spaces = relief/vulnerability. Ceiling height changes pressure — low feels oppressive, high feels awe-inspiring."],["Authored vs Procedural","Authored (Zelda dungeons): precise emotional control. Procedural (Minecraft worlds): infinite variety. Both valid, different skill sets."],["Grayboxing","Start untextured — test spatial logic before art investment. If it doesn't work in graybox, it won't work shipped."]],"takeaway":"If a player gets lost or confused, the level failed — not the player. Every confusion is a design problem.","tip":"Play your level in graybox. Every 30s, write what the player sees, understands, feels. 'Nothing' or 'confused' = fix before adding art."}},
{"id":"economy","cat":"Systems Design","icon":"💰","title":"Economy Design","tag":"Resources in, decisions out","c30s":{"h":"Every game has an economy — even if it doesn't have money.","b":"Resources flow in (sources), transform (converters), drain out (sinks). Gold, health, ammo, time, attention — all economic resources. Well-designed = meaningful choices. Broken = trivially easy or impossibly frustrating."},"c3m":{"intro":"Economy design governs how resources enter, move through, and leave a system. One of the least intuitive aspects — and most impactful.","sec":[["Sources, Sinks, Converters","Sources generate (mining gold). Sinks remove (buying items). Converters transform (crafting wood→furniture). A healthy economy balances all three."],["Why Monopoly Breaks","Sources (passing Go) but limited sinks. Money accumulates, rich get richer, games drag. Designed to teach unchecked capitalism — which is why nobody finishes happily."],["Scarcity Creates Decisions","Unlimited health potions = no decision. Three for the whole dungeon = every use is strategic. Scarcity transforms numbers into decisions."],["Inflation","Resources accumulate faster than sinks drain them — everything becomes meaningless. Why MMOs add gold sinks and Candy Crush limits lives."]],"ex":"In Settlers of Catan, the entire game IS the economy. Scarcity drives every negotiation, placement, and trade.","try":"Play Monopoly or Catan and track every resource entering and leaving. Where are sources? Sinks? What happens when one player accumulates too much?"},"c30m":{"insight":"An economy is a system of interconnected choices. When any resource stops mattering, decisions die.","intro":"Economy design is one of the least intuitive aspects. Numbers balanced on spreadsheets produce wildly broken experiences in practice.","sec":[["The Four Building Blocks","Every economy maps onto: <strong>Sources</strong>, <strong>Pools</strong>, <strong>Converters</strong>, <strong>Sinks</strong>.<div class='diagram-box'>Source → [Pool] → Converter → [Pool] → Sink\n  ⬆                                    |\n  └────────── feedback loop ───────────┘</div>"],["Dual Currency","F2P games: soft currency (earned) and hard currency (purchased). Separates time from money investment. Clash of Clans: gold vs gems. Fortnite: V-Bucks blur the line."],["The Bathtub Model","Each pool is a bathtub. Faucet = source, drain = sink. Overflow = inflation, empty = deflation. Economy design = controlling flow rates at each game stage."],["Real-World Parallels","WoW's Auction House experienced real inflation. Animal Crossing's 'Stalk Market' mirrors stock trading. Games accidentally teach economics."],["Time as Currency","Candy Crush lives, Clash of Clans timers, Pokémon GO egg hatching. All convert player time into controlled progress — balancing respect against business goals."],["Resource Types","<table class='content-table'><tr><th>Type</th><th>Behavior</th><th>Examples</th></tr><tr><td>Consumable</td><td>Used once</td><td>Potions, ammo</td></tr><tr><td>Renewable</td><td>Regenerates</td><td>Mana, stamina</td></tr><tr><td>Permanent</td><td>Kept forever</td><td>Skill points, unlocks</td></tr><tr><td>Time-gated</td><td>Refills on schedule</td><td>Daily rewards, energy</td></tr></table>Each creates different decisions: scarcity tension, timing, commitment anxiety, return motivation."],["Inflation Death Spiral","Players accumulate faster than the game drains — purchases become trivial, gold loses meaning. Prevention: escalating sinks, prestige resets, or resource caps."]],"takeaway":"Test: if you doubled every resource, would any decision disappear? If yes, that resource is doing design work. Protect it.","tip":"Map your economy on paper: every source, sink, converter. For each pool: can it overflow? Run empty? What happens to the experience?"}},
{"id":"narrative","cat":"Systems Design","icon":"◧","title":"Narrative Design","tag":"Story as system, not decoration","c30s":{"h":"In a game, story is a system — not a script.","b":"The best game narratives emerge from play, not despite it. A player who makes a choice and lives with consequences is more moved than one watching a cutscene."},"c3m":{"intro":"In games, players are partly narrators — choosing order, pace, and sometimes content. This is both the power and the challenge.","sec":[["Narrative vs Story","Story is what happened. Narrative is how it's told. In games, players choose order, pace, content. The story must work across multiple paths and dispositions."],["Ludonarrative Consonance","When gameplay contradicts story: Nathan Drake, charming adventurer who kills hundreds. Great games align what you do with what you are. Undertale makes the dissonance the point."],["Environmental Storytelling","A skeleton with an arrow. A child's room with boarded windows. Zelda: Breath of the Wild tells stories through ruins. Rewards curiosity, never pauses play."],["When to Use Cutscenes","For moments needing cinematic weight gameplay can't provide. Never to explain what play could show. The most expensive narrative tool — spend wisely."]],"ex":"In The Sims, families develop personalities, fall in love, and burn down kitchens — stories the designers never wrote. That's emergent narrative.","try":"Your most memorable game moment — was it a cutscene or gameplay? For most players, the answer reveals interactive narrative's power."},"c30m":{"insight":"The most powerful game stories are the ones players tell themselves.","intro":"Game narrative architecture includes branching structures: linear, parallel, branching, and modular — each with different cost and control tradeoffs.","sec":[["Narrative Architecture","Linear (The Last of Us): one path, maximum control. Parallel (Heavy Rain): paths converge. Branching (The Witcher 3): genuine forks. Modular (Hades): beats assemble based on behavior. Each multiplies cost differently."],["Ludonarrative Dissonance","Clint Hocking coined it for BioShock. The fix isn't always changing mechanics — sometimes framing is the answer. Undertale makes dissonance deliberately uncomfortable."],["Emergent Narrative","The most powerful stories are generated by systems. The Sims creates family dramas. Minecraft tells the story of your world. Civilization tells empire history."],["Player Choice That Matters","Telltale's Walking Dead made choices feel meaningful even when many converged. Detroit: Become Human created genuinely divergent paths. The spectrum from illusion to true branching."],["Characters for Games","80+ hours of interaction. Give characters beliefs, not just goals — a character with beliefs responds consistently to novel situations."],["The Zelda Approach","Environmental storytelling through world design. Breath of the Wild's ruins tell the Calamity's story without exposition. Players who explore understand; those who rush still enjoy."]],"takeaway":"Design narrative to reward curiosity without punishing speed. The best stories are discovered, not delivered.","tip":"Write your story in three sentences. Can the player discover it through play alone, without cutscenes? If not, redesign the discovery."}},
{"id":"replayability","cat":"Systems Design","icon":"⟳","title":"Replayability","tag":"Making 'one more run' inevitable","c30s":{"h":"Replayability is the product of meaningful variation.","b":"Not randomness for its own sake — but choices, systems, and surprises that make each playthrough uniquely yours."},"c3m":{"intro":"Players replay to discover possibilities, improve skill, experience different outcomes, optimize strategy, or relive something they love.","sec":[["Why Players Return","Discovery, mastery, different outcomes, optimization, or nostalgia. Great replayability serves all simultaneously."],["Types of Replayability","Procedural generation (Minecraft), meaningful choice (The Witcher 3, Skyrim), mastery (Celeste), emergent systems (The Sims). The best games combine multiple types."],["Replayability vs More Content","Adding levels ≠ replayability. It's systemic — emerges from design, not volume. A 20-hour reactive game > a 200-hour linear one."],["The Hook of Discovery","Replayable games withhold depth. Run 1 shows 20%. The drive to find the other 80% keeps players returning."]],"ex":"Hades solved narrative in repetition: every death advances relationships and reveals story. Failure is both mechanically and narratively progressive.","try":"A game you've replayed many times — what brought you back? New content or better play? That distinction shapes replayability design."},"c30m":{"insight":"A replayable game isn't one with more content — it's one where the same content reveals new depth.","intro":"The roguelite genre has explored replayability more systematically than any other — and its lessons apply everywhere.","sec":[["The Roguelite Lab","Hades makes failure progressive — each death advances narrative. The structure that once felt like punishment becomes invitation."],["Knowledge vs Skill","Knowledge replayability: discover new things. Skill: get better at known things. Zelda games are knowledge-heavy; Mario is skill-heavy. Best games offer both."],["Designing for Play Ages","1 hour: discovering. 10 hours: establishing preferences. 100 hours: mastering and optimizing. Each phase needs different systems to feel fresh."],["Emergent Narrative","The Sims generates unplanned stories. Minecraft worlds are unique. Civilization campaigns diverge wildly. Systems that surprise the designer create infinite replayability."],["Speedrunning","Community-created replayability. Players reframe games as optimization puzzles. Mario, Zelda, Pokémon all have thriving speedrun communities — extending game life by years."],["Anti-patterns","Artificial barriers (energy systems), repetitive content (identical side quests), completion pressure (achievement hunting as obligation). These force repetition without creating desire."]],"takeaway":"Design for both knowledge and skill replayability. A game offering both has a longer, more engaged lifespan.","tip":"What does your game feel like at 1 hour, 10 hours, 100 hours? If any feels identical to the previous, you have a replayability gap."}},
{"id":"identity","cat":"Design Strategy","icon":"◇","title":"Game Identity","tag":"Standing out while feeling familiar","c30s":{"h":"Game identity is what makes your game irreplaceable.","b":"Not genre or art style — it's the unique combination of what you do, how it feels, and what it means. Great games have a center of gravity no other game has."},"c3m":{"intro":"Identity is the thing you'd lose if you changed one core element. Remove building from Minecraft: it collapses.","sec":[["What Is Game Identity","Remove the time mechanic from Majora's Mask: different game. Remove building from Minecraft: it collapses. The element that can't be removed without ruining everything — that's identity."],["The Three Pillars Model","3 core promises. Every decision judged against them. Features not serving a pillar don't ship. A framework for saying no to good ideas that aren't YOUR ideas."],["Familiarity as Foundation","Players need anchors. Recognizable genre gives foundation. 'It's like X, but…' is powerful because it does cognitive work before the player touches the game."],["The Irreplaceability Test","What experience does only this game provide? If the answer is nothing — the design work isn't done."]],"ex":"God of War's pillars: 'brutal, beautiful, Norse.' Every decision — combat feel, world scale, art direction — served at least one.","try":"Describe your favorite game's identity in one sentence without mentioning its genre. Strong identity = easy. Weak identity = you're describing the genre."},"c30m":{"insight":"Identity is what players remember when they close the game. Not what you built — what they felt.","intro":"The three pillars model is the most practical identity tool. Define what your game promises, then use those promises to make every decision.","sec":[["Pillars in Practice","God of War: brutal, beautiful, Norse. Scope decisions become sharper — 'is this brutal, beautiful, or Norse?' If none, cut it."],["The Indie Advantage","Constraints breed identity. Undertale: refusing genre violence. Stardew Valley: the life you choose vs the one expected. Scope IS identity."],["Familiar Scaffolding","Every memorable game has familiar scaffolding. Hades = roguelite. Among Us = social deduction. Genre sets expectations; the game subverts them."],["Auteur Theory","What does a Miyazaki game feel like? (Dark Souls, Elden Ring.) Consistent aesthetic signature — identifiable blindfolded from 10 seconds of play."],["Genre Refusal","Dark Souls refuses to explain itself. Animal Crossing refuses urgency. These refusals define who the game is for — and who it isn't."],["Sequels and Identity","Players want new but return for what was there. Adding too much dilutes. Pokémon's core loop survived 25+ years because each generation deepens rather than replaces."]],"takeaway":"Define pillars early. Use them to say 'no' to good ideas that don't serve your game's unique promise.","tip":"Define 3 pillars. For every feature, ask: which pillar does this serve? If 'none' — cut it, no matter how cool."}},
{"id":"multiplayer","cat":"Design Strategy","icon":"👥","title":"Multiplayer & Social Design","tag":"Designing for human nature","c30s":{"h":"Adding another player doesn't double the fun — it transforms the game entirely.","b":"Multiplayer means designing for human behavior — cooperation, competition, communication, trust, betrayal. Your systems will be used in ways you never intended, because humans are creative, social, and occasionally terrible."},"c3m":{"intro":"Multiplayer design is human behavior design. Every rule creates a social space that players will inhabit in unexpected ways.","sec":[["Competitive vs Cooperative","Competition creates tension (Chess, FIFA, Fortnite). Cooperation creates bonding (Minecraft co-op, Overcooked). Mario Kart blends both — competitive but rubber-banding keeps it social."],["The Toxicity Problem","Any multiplayer produces toxic behavior. Ping systems (Fortnite, Apex) enable communication without voice. Limited emotes prevent abuse while keeping expression."],["Matchmaking","ELO from chess, MMR in modern games. Too strict = long queues. Too loose = stomps. No system is perfect."],["Asymmetric Multiplayer","Among Us: impostors and crewmates play different games. Hide-and-seek: fundamentally different experiences. The tension between asymmetric roles IS the game."],["Local Multiplayer","Mario Kart, Overcooked, Jackbox — shared physical space, laughter, eye contact. The social experience IS the game."]],"ex":"Hide-and-seek — the playground game — is perfect asymmetric multiplayer. Different experiences, same drama, every time.","try":"Next game night: one competitive game, one cooperative. Notice how social energy changes. Competition = tension spikes; cooperation = sustained focus."},"c30m":{"insight":"The best multiplayer games don't just connect players — they create relationships.","intro":"Multiplayer design is fundamentally human behavior design. Your rules create a social space — design it with the same care as a physical one.","sec":[["Designing for Human Nature","Players min-max, grief, cooperate, betray, form alliances. Minecraft servers have built governments. Your rules create a social contract."],["Communication Design","Voice chat: powerful but enables toxicity. Text: slower, considered. Pings: middle ground. Communication tools shape social experience as much as mechanics do."],["The Spectator Effect","Fortnite's success partly about being watchable. Games designed for spectators (clear visuals, dramatic moments) benefit enormously from streaming culture."],["Team Design","Random matchmaking = disposable relationships. Persistent teams (WoW guilds, Clash of Clans clans) create long-term bonds that keep players returning for years."],["The Free Rider Problem","In co-op, some contribute less. Solutions: individual accountability, interdependent roles, small teams. Overcooked solves this by making every role essential and visible."],["Anti-Cheat as Design","Cheating is a design problem. When cheating is more rewarding than playing, design has failed. Fair systems and intrinsic motivation reduce cheating more than detection."]],"takeaway":"Your rules create a social space. Design that space with the same care you'd design a physical one.","tip":"Game night: play competitive (Uno), cooperative (any co-op), hidden roles (Werewolf/Among Us). After each: what social dynamics emerged?"}},
{"id":"accessibility","cat":"Ethics & Access","icon":"♿","title":"Accessibility","tag":"Design for the full spectrum of players","c30s":{"h":"Accessibility isn't charity — it's design excellence.","b":"Over a billion people have disabilities. Accessible design improves experience for everyone — subtitles help in noisy rooms, remappable controls help left-handed players, colorblind modes help 8% of men."},"c3m":{"intro":"Accessibility removes barriers between players and play. It's not about lowering standards — it's about widening doors.","sec":[["The Four Dimensions","Visual (colorblind modes, scalable text), auditory (subtitles, visual indicators), motor (remappable controls, adjustable timing), cognitive (clear UI, adjustable speed)."],["The Curb Cut Effect","Curb cuts for wheelchairs help strollers, luggage, cyclists. Game accessibility features benefit everyone — subtitles, difficulty options, customizable controls all improve the experience universally."],["Celeste's Gold Standard","Assist Mode: slow time, add dashes, toggle invincibility — without judgment. Message: the experience matters more than specific constraints."],["Cheaper Than You Think","Remappable controls, subtitles, colorblind filters are inexpensive early in development. Expensive when retrofitted late."]],"ex":"Pokémon: turn-based (no time pressure), simple controls, adjustable difficulty through team choice, text-heavy (read at any pace). One of the most naturally accessible RPG franchises — no compromise required.","try":"Play your favorite game one-handed. Then sound off. Then squinting. Where does it break? Those are accessibility gaps."},"c30m":{"insight":"Every player is temporarily abled. Design for the full spectrum of human capability.","intro":"Accessibility is both ethical obligation and design opportunity. The constraints it imposes often produce better design for everyone.","sec":[["The Last of Us Part II","60+ options: audio descriptions, high contrast, text-to-speech, full remapping. Proved AAA action games can be fully accessible without compromising vision."],["Cognitive Accessibility","Dyslexia: clear fonts, avoid text walls. ADHD: save anywhere, clear objectives. Anxiety: pause options, no time pressure. Often overlooked, hugely impactful."],["The Legal Landscape","European Accessibility Act (2025), US regulations expanding. Designing accessibly is both ethical and increasingly mandatory."],["Testing with Disabled Players","No checklist replaces real playtesting. AbleGamers and SpecialEffect connect developers with disabled testers."],["Accessibility as Constraint","Designing without sound forces better visual feedback. One-handed play forces simpler controls. Constraints breed creativity."],["Quick Wins","<table class='content-table'><tr><th>Feature</th><th>Effort</th><th>Impact</th></tr><tr><td>Remappable controls</td><td>Low</td><td>High</td></tr><tr><td>Scalable UI/text</td><td>Low</td><td>High</td></tr><tr><td>Subtitles + speaker ID</td><td>Low</td><td>High</td></tr><tr><td>Colorblind palette</td><td>Low</td><td>Medium</td></tr><tr><td>Adjustable speed</td><td>Medium</td><td>High</td></tr><tr><td>Pause anywhere</td><td>Low</td><td>Medium</td></tr></table>"]],"takeaway":"Start with quick wins — remappable controls, subtitles, scalable text. Every feature opens your game to more players.","tip":"Accessibility audit: one-handed? No sound? No color differentiation? Large text only? Score each 1–5. Lowest = highest priority."}},
{"id":"monetization","cat":"Ethics & Access","icon":"⚖️","title":"Monetization & Ethics","tag":"How money shapes design","c30s":{"h":"How you make money from your game shapes how players experience it.","b":"Monetization is design, not a separate department. A pay-once game and a F2P game with identical mechanics feel fundamentally different — because the business model shapes what the game asks of the player."},"c3m":{"intro":"Your business model is a design decision as fundamental as your core mechanic. It shapes every interaction between game and player.","sec":[["The Models","Premium (Minecraft, Zelda): pay once, play forever. F2P (Fortnite, Candy Crush): free entry, optional spending. Subscription (WoW): ongoing access. Each creates different design incentives."],["Cosmetic vs Pay-to-Win","Fortnite proved cosmetic-only can generate billions. Players accept paying for looks, not advantage. Balance-affecting purchases erode trust permanently."],["The Loot Box Question","Random rewards for real money = slot machine psychology. Several countries classified as gambling. Key questions: does the player know what they're buying? Is the audience children?"],["Respect as Strategy","Games respecting time and money build communities. Minecraft's buy-once generated more lifetime revenue than most F2P — trust creates evangelists."]],"ex":"Fortnite and Candy Crush: both free, completely different feel. Fortnite sells cosmetics. Candy Crush sells solutions to frustration it deliberately creates. One respects the player; the other monetizes impatience.","try":"Next free phone game: notice every wait/ad/spend prompt. Are they at frustration points (exploitative) or delight points (generous)?"},"c30m":{"insight":"The best monetization feels like a thank-you, not a tollbooth.","intro":"Monetization shapes every interaction. Choosing the right model is as important as choosing the right core mechanic.","sec":[["The Attention Economy","Players pay with time and attention, not just money. Ad-supported games monetize attention directly. Are you creating value or extracting it?"],["Dark Patterns","Artificial energy waits, FOMO notifications, difficulty spikes before purchase prompts, daily logins punishing absence. Design choices benefiting developer at player's expense."],["The Ethics Framework","Three questions: Would I be comfortable if a journalist described this? If my child encountered it? Does the player feel good afterward?"],["Regulation","Belgium banned loot boxes. Netherlands, Australia investigated. PEGI/ESRB now label randomized purchases. Industry moving toward transparency."],["Premium's Quiet Strength","Minecraft, Stardew Valley, Zelda thrive because purchase aligns incentives: developer profits when player enjoys, not when frustrated."],["F2P Done Right","Fortnite's battle pass: clear value. League of Legends: all champions earnable through play. The free experience must be genuinely complete."],["The Long View","Exploitative = short spikes, long erosion. Generous = slower growth, lasting loyalty. The math favors generosity over time."]],"takeaway":"Your model is a design decision. Choose one that incentivizes making the game more fun, not more frustrating.","tip":"Write your monetization in one sentence. Does it incentivize fun or frustration? If frustration — redesign before building features."}},
{"id":"onboarding","cat":"Process","icon":"◎","title":"Onboarding","tag":"Teaching without breaking the spell","c30s":{"h":"The best tutorial is no tutorial.","b":"Design a game that teaches itself — through environment, consequence, and the joy of discovery. When you must explain, show instead of telling."},"c3m":{"intro":"Onboarding introduces players to mechanics and world. Done well, it's invisible. Done poorly, it's the reason players quit before the game begins.","sec":[["Why Tutorials Break Games","They interrupt flow and treat players as incompetent. Most players skip text walls — and they're right to."],["Show, Don't Tell","First level reveals rules through play. Pit teaches 'don't fall.' Locked door + nearby key teaches 'keys open doors.' No text needed."],["Progressive Disclosure","Don't reveal everything at once. Introduce in order of necessity, one thing at a time. The first 10 minutes of a great game = a masterclass in layered teaching."],["The Nintendo Model","Mario's World 1-1 teaches everything in 40 seconds without a word. The gold standard."]],"ex":"Portal's first rooms are a vocabulary lesson in spatial logic — experienced as discovery, not instruction.","try":"Watch someone play a game for the first time. Don't help. Note every confused moment — each is a design failure, not a player failure."},"c30m":{"insight":"A confused player is never wrong. A confusing game always is.","intro":"Onboarding is both art and science — requiring deep understanding of player psychology and environmental communication.","sec":[["Environmental Teaching","The game world teaches. Portal's first rooms. Every element that doesn't teach something is a missed opportunity."],["The Safe Failure Zone","First section: low stakes, immediate respawn, educational consequences. Dark Souls' earliest enemies are easy — each teaches telegraphed attacks, spacing, patience."],["Contextual vs Isolated","Isolated tutorials (loading tips) deliver info when least relevant. Contextual teaches in the moment of need — 10× retention difference."],["Multiple Player Types","Some read tooltips, some skip everything, some ask for help. Design for all three: learnable by exploring, reading, or following prompts."],["Mystery as Teaching Tool","Not everything needs explaining. Zelda's locked doors and Pokémon's HM barriers create anticipation — memory hooks that pull players forward."],["The Onboarding Audit","Playtest with a newcomer. Say nothing. Observe where they stop. Confusion = design failure."]],"takeaway":"If your game needs a tutorial to explain itself, your game has a design problem. The tutorial should BE the game.","tip":"One person, never seen your game. Sit behind them, 15 minutes, silent. Note: first click, where they stop, confused faces. After: 'What was going through your mind?' Write everything."}},
{"id":"prototyping","cat":"Process","icon":"✏️","title":"Prototyping","tag":"Build rough to learn fast","c30s":{"h":"Your first prototype will be wrong. That's the whole point.","b":"Prototyping destroys assumptions. The fastest way to find if an idea is fun is to play a rough version immediately. Every hour of polish before validation is potentially wasted."},"c3m":{"intro":"Prototyping is building the minimal testable version of a design idea. It is the most important habit in game design.","sec":[["Paper First","Cards, tokens, dice can test core design in hours, not weeks. Chess, Poker, many digital games started as paper. If the paper version isn't fun, the digital won't be either."],["Kill Your Darlings Early","A failed prototype on day 2 is more valuable than a polished failure at launch. Celebrate failed prototypes as data, not defeats."],["Prototype One Question","Each prototype tests one question: 'Is this movement fun?' — not 'Is this game fun?' Write the question first. One sentence, or scope down."]],"ex":"'Does it feel good to shoot?' — the only question for early Halo prototypes. Movement, story, multiplayer came later.","try":"Any game idea you've had — can you test the core mechanic with paper, dice, and tokens? If you can build it in 30 minutes, do it tonight."},"c30m":{"insight":"A prototype that fails on day 2 is worth more than a polished build that fails at launch.","intro":"Prototyping is a mindset before it's a technique. Its power: never spend time on details before validating the whole.","sec":[["Types of Prototypes","Paper (rules/structure), digital (feel/feedback/physics), Wizard of Oz (human secretly running the system — tests UX and AI without building them)."],["The Game Jam Mindset","48-hour jams (Ludum Dare, Global Game Jam) force scope to one interesting mechanic. Superhot began as a jam prototype."],["Documenting Learning","Prototypes die; learning must survive. After each: what question, what observed, what changes. Prevents re-testing failed ideas."],["Prototype vs Vertical Slice","Vertical slice = polished shippable excerpt. Prototype = rough and disposable. Confusing them harms in both directions."],["When to Expand Scope","Some systems need intersection to be fun (economy + progression). Prototype the intersection of two systems, not one in isolation."]],"takeaway":"The purpose of a prototype is to learn, not to build. If you're not learning, you're just building slowly.","tip":"72-Hour Challenge: take an idea, build the smallest playable version. Play with one uninvolved person. Watch their face. Write one sentence: what did the prototype teach?"}},
{"id":"playtesting","cat":"Process","icon":"👁️","title":"Playtesting","tag":"Learning by watching people play","c30s":{"h":"You are not your player.","b":"You know your game too well to experience it fresh. The only way to recover a first-time perspective is to watch one — in silence, without intervening, without explaining."},"c3m":{"intro":"Playtesting is systematic observation of players interacting with your game. Not beta testing (bugs) or user research (preferences) — design research.","sec":[["Don't Explain","When a tester gets stuck, resist helping. Their confusion is data. If they can't figure it out, the game failed — not the player. Explaining contaminates the test."],["What to Watch","Where they look (not what they say). When they slow down or stare. Facial expressions don't lie; verbal self-reports often do."],["Guerrilla vs Formal","Guerrilla (friend at coffee shop): fast, cheap, unreliable. Formal (recruited participants, controlled conditions): slow, expensive, reliable. Both needed — guerrilla early, formal before launch."]],"ex":"Hearthstone's first outside playtest — after 18 months internal — revealed drag-and-drop was opaque to new players. One session fixed what blind spots couldn't.","try":"Show a friend something you made. Don't explain. Watch. The urge to explain is your instinct saying something isn't clear enough."},"c30m":{"insight":"The most expensive design mistake is the one you could have caught by watching one person play for ten minutes.","intro":"Playtesting is both humbling and efficient. Most veteran designers cite it as the skill they wish they'd developed earlier.","sec":[["Think-Aloud Protocol","Ask the player to narrate thoughts in real time: 'I see this button, I'm wondering if…' Surfaces invisible confusion that observation alone misses."],["Testing at Different Scales","Unit (single mechanic), scene (single level), system (full loop, 30–60 min), campaign (full experience). Each reveals different problems."],["Clustering Observations","7/8 stuck at the same spot = systematic flaw. 1/8 does something unexpected = noise or creativity. Act on patterns (3+ observations)."],["The Self-Report Problem","Players report inaccurately. 'I love this' while visibly frustrated = unreliable. Trust behavior over stated opinions."],["Building a Playtesting Culture","Regular and early — not just before ship. Weekly sessions from first prototype. Keeps the team grounded in player experience."]],"takeaway":"Playtesting isn't validating your design — it's discovering what your design actually communicates. The difference is humility.","tip":"One person, never seen your game. Set up, sit silently 15 minutes. Note: first click, pauses, confused expressions. After: 'What was going through your mind?' Write everything. Only then explain."}}
];

const CATEGORIES = [];
const catMap = {};
TOPICS_RAW.forEach(t => {
  if (!catMap[t.cat]) { catMap[t.cat] = []; CATEGORIES.push({name:t.cat, topics:catMap[t.cat]}); }
  catMap[t.cat].push(t);
});
const allTopics = TOPICS_RAW;
const find = id => allTopics.find(t=>t.id===id) || allTopics[0];
const flatIds = allTopics.map(t=>t.id);

let curId = flatIds[0], curDepth = '30s';

function setDepth(d){curDepth=d;render()}
function setTopic(id){curId=id;render();closeMobile()}
function prevTopic(){const i=flatIds.indexOf(curId);if(i>0)setTopic(flatIds[i-1])}
function nextTopic(){const i=flatIds.indexOf(curId);if(i<flatIds.length-1)setTopic(flatIds[i+1])}

function render(){
  renderSidebar();renderDepth();renderMain();renderMobileBtn();
}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  let h='';
  CATEGORIES.forEach(c=>{
    h+=`<div class="sidebar-cat">${c.name}</div>`;
    c.topics.forEach(t=>{
      h+=`<div class="sidebar-item ${t.id===curId?'active':''}" onclick="setTopic('${t.id}')"><span class="icon">${t.icon}</span><div><span class="label">${t.title}</span><span class="tag">${t.tag}</span></div></div>`;
    });
  });
  sb.innerHTML=h;
}

function renderDepth(){
  const ds=document.getElementById('depthSelector');
  ds.innerHTML=['30s','3m','30m'].map(d=>{
    const active=curDepth===d?`active-${d}`:'';
    const labels={'30s':'⚡ 30s','3m':'📖 3 min','30m':'🔭 30 min'};
    return `<button class="depth-btn ${active}" onclick="setDepth('${d}')">${labels[d]}</button>`;
  }).join('');
}

function renderMain(){
  const t=find(curId);
  const idx=flatIds.indexOf(curId);
  let h=`<div class="topic-header"><div class="topic-icon">${t.icon}</div><h1 class="topic-title">${t.title}</h1><p class="topic-tag">${t.tag}</p></div>`;
  if(curDepth==='30s') h+=r30s(t.c30s);
  else if(curDepth==='3m') h+=r3m(t.c3m);
  else h+=r30m(t.c30m);
  h+=`<div class="bottom-nav"><button class="nav-btn" onclick="prevTopic()" ${idx===0?'disabled':''}>← Previous</button><button class="nav-btn" onclick="nextTopic()" ${idx===flatIds.length-1?'disabled':''}>Next →</button></div>`;
  document.getElementById('mainContent').innerHTML=h;
}

function r30s(d){
  return `<div class="content-30s"><div class="headline-30s">${d.h}</div><p class="context-30s">${d.b}</p></div>`;
}

function r3m(d){
  let h='<div class="content-3m">';
  if(d.intro) h+=`<p class="intro-3m">${d.intro}</p>`;
  d.sec.forEach(s=>{
    h+=`<div class="section-3m"><h3>${s[0]}</h3><p>${s[1]}</p></div>`;
  });
  if(d.ex) h+=`<div class="example-box"><div class="elabel">💡 Example</div><p>${d.ex}</p></div>`;
  if(d.try) h+=`<div class="try-this"><div class="elabel">✦ Try This</div><p>${d.try}</p></div>`;
  h+='</div>';
  return h;
}

function r30m(d){
  let h='<div class="content-30m">';
  if(d.insight) h+=`<div class="key-insight">"${d.insight}"</div>`;
  if(d.intro) h+=`<p class="intro-30m">${d.intro}</p>`;
  d.sec.forEach(s=>{
    h+=`<div class="section-30m"><h3>${s[0]}</h3><div class="body">${s[1]}</div></div>`;
  });
  if(d.takeaway) h+=`<div class="takeaway-box"><div class="elabel">⊞ Key Takeaway</div><p>${d.takeaway}</p></div>`;
  if(d.tip) h+=`<div class="practical-tip"><h3>🛠 Practical Exercise</h3><p>${d.tip}</p></div>`;
  h+='</div>';
  return h;
}

function renderMobileBtn(){
  const t=find(curId);
  document.getElementById('mobileBtnIcon').textContent=t.icon;
  document.getElementById('mobileBtnTitle').textContent=t.title;
}

document.getElementById('mobileMenuBtn').addEventListener('click',()=>{
  const dd=document.getElementById('mobileDropdown');
  if(dd.classList.contains('show')){closeMobile();return;}
  let h='';
  CATEGORIES.forEach(c=>{
    h+=`<div class="sidebar-cat">${c.name}</div>`;
    c.topics.forEach(t=>{
      h+=`<div class="sidebar-item ${t.id===curId?'active':''}" onclick="setTopic('${t.id}')"><span class="icon">${t.icon}</span><div><span class="label">${t.title}</span><span class="tag">${t.tag}</span></div></div>`;
    });
  });
  dd.innerHTML=h;dd.classList.add('show');
});

function closeMobile(){document.getElementById('mobileDropdown').classList.remove('show')}
render();
</script>
</body>
</html>

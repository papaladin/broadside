  <!-- Load game data (no Babel needed — plain JS) -->

  <script>
    const ports = window.D.PORTS;
    const ships = window.D.SHIPS;

    // ── Reachability matrix ────────────────────────────────────
    function reachablePorts(homeKey, ship) {
      const maxDays = ship.maxDays;
      const speed   = ship.speed;
      let count = 0;
      for (const [targetKey, target] of Object.entries(ports)) {
        const dx = target.x - ports[homeKey].x;
        const dy = target.y - ports[homeKey].y;
        const dist = Math.hypot(dx, dy);
        const days = Math.ceil(dist / (speed * 4));
        if (days <= maxDays) count++;
      }
      return count;
    }

    function buildReachabilityTable() {
      const shipKeys = Object.keys(ships);
      let html = '<h2>🗺 Reachability (ports reachable within maxDays)</h2>';
      html += '<table><tr><th>Home Port</th>';
      shipKeys.forEach(s => html += `<th>${s}</th>`);
      html += '</tr>';

      for (const [pKey, p] of Object.entries(ports)) {
        html += `<tr><td>${p.name}</td>`;
        shipKeys.forEach(sk => {
          html += `<td>${reachablePorts(pKey, ships[sk])}</td>`;
        });
        html += '</tr>';
      }
      html += '</table>';
      document.getElementById('reachability').innerHTML = html;
    }

    function getReachablePortKeys(homeKey, ship) {
  const maxDays = ship.maxDays;
  const speed   = ship.speed;
  const reachable = [];
  for (const [targetKey, target] of Object.entries(ports)) {
    const dx = target.x - ports[homeKey].x;
    const dy = target.y - ports[homeKey].y;
    const dist = Math.hypot(dx, dy);
    const days = Math.ceil(dist / (speed * 4));
    if (days <= maxDays) reachable.push(targetKey);
  }
  return reachable;
}


/// ---- MINIMUM VIABLE START PORTS --------------------

function minViableStarterPorts() {
  const dinghy = window.D.SHIPS.dinghy;
  const essential = ["shipyard", "crew", "missions"];
  let html = '<h2>🛶 Minimum‑Viable Starter Ports (Dinghy, ≥2 reachable neighbours)</h2>';
  html += '<table><tr><th>Port</th><th>Reachable</th><th>Services Coverage</th></tr>';

  for (const [pKey, p] of Object.entries(ports)) {
    const reachableKeys = getReachablePortKeys(pKey, dinghy);
    if (reachableKeys.length < 2) continue;

    // union of services across all reachable ports
    const services = new Set();
    reachableKeys.forEach(rk => {
      (ports[rk].services || []).forEach(s => services.add(s));
    });

    const missing = essential.filter(s => !services.has(s));
    const coverage = missing.length === 0
      ? '✅ All present'
      : '❌ Missing: ' + missing.join(', ');

    html += `<tr><td>${p.name}</td><td>${reachableKeys.length}</td><td>${coverage}</td></tr>`;
  }
  html += '</table>';
  document.getElementById('starter').innerHTML = html;
}


// --- MAP FULLY CROSSABLE BY SHIPS -------

function furthestDistanceCheck() {
  let maxDist = 0;
  let pair = ['',''];
  const portArr = Object.entries(ports);
  for (let i = 0; i < portArr.length; i++) {
    for (let j = i+1; j < portArr.length; j++) {
      const a = portArr[i][1], b = portArr[j][1];
      const d = Math.hypot(b.x - a.x, b.y - a.y);
      if (d > maxDist) { maxDist = d; pair = [portArr[i][0], portArr[j][0]]; }
    }
  }

  // range of largest ship
  let maxRange = 0;
  Object.values(window.D.SHIPS).forEach(s => {
    const r = s.speed * 4 * s.maxDays;
    if (r > maxRange) maxRange = r;
  });

  const ok = maxDist <= maxRange;
  let html = '<h2>📏 Furthest Distance</h2>';
  html += `<p>Max distance: <b>${Math.round(maxDist)}</b> units between <b>${ports[pair[0]].name}</b> and <b>${ports[pair[1]].name}</b></p>`;
  html += `<p>Largest ship range: <b>${maxRange}</b> units (speed × 4 × maxDays)</p>`;
  html += ok ? '<p style="color:#4caf50">✅ Map is fully traversable by the largest ship.</p>'
             : '<p style="color:#f44336">❌ Some voyages are impossible even for the largest ship.</p>';
  document.getElementById('furthest').innerHTML = html;
}



function islandsOfIsolation() {
  let html = '<h2>🏝 Islands of Isolation (Disconnected Port Groups)</h2>';

  Object.entries(ships).forEach(([shipKey, ship]) => {
    // Build adjacency list: port -> list of reachable ports for this ship
    const adj = {};
    Object.keys(ports).forEach(p => adj[p] = []);
    Object.keys(ports).forEach(p => {
      Object.keys(ports).forEach(q => {
        if (p === q) return;
        const dx = ports[q].x - ports[p].x;
        const dy = ports[q].y - ports[p].y;
        const days = Math.ceil(Math.hypot(dx, dy) / (ship.speed * 4));
        if (days <= ship.maxDays) {
          adj[p].push(q);
        }
      });
    });

    // Find connected components via BFS
    const visited = new Set();
    const components = [];
    Object.keys(ports).forEach(p => {
      if (!visited.has(p)) {
        const comp = [];
        const queue = [p];
        visited.add(p);
        while (queue.length) {
          const cur = queue.shift();
          comp.push(cur);
          adj[cur].forEach(nbr => {
            if (!visited.has(nbr)) {
              visited.add(nbr);
              queue.push(nbr);
            }
          });
        }
        components.push(comp);
      }
    });

    const count = components.length;
    const status = count === 1
      ? '<span style="color:#4caf50">✅ Fully connected</span>'
      : `<span style="color:#f44336">❌ Split into ${count} groups</span>`;

    html += `<h3>🛟 ${shipKey} (max ${ship.maxDays} days, speed ${ship.speed})</h3>`;
    html += `<p>${status}</p>`;
    if (count > 1) {
      html += '<ul>';
      components.forEach((comp, idx) => {
        const names = comp.map(k => ports[k].name).join(', ');
        html += `<li><b>Group ${idx+1}:</b> ${names}</li>`;
      });
      html += '</ul>';
    }
  });

  document.getElementById('islands').innerHTML = html;
}

function dinghyGroupMembership() {
  const dinghy = window.D.SHIPS.dinghy;
  // Build connectivity groups for the dinghy
  const adj = {};
  Object.keys(ports).forEach(p => adj[p] = []);
  Object.keys(ports).forEach(p => {
    Object.keys(ports).forEach(q => {
      if (p === q) return;
      const dx = ports[q].x - ports[p].x;
      const dy = ports[q].y - ports[p].y;
      const days = Math.ceil(Math.hypot(dx, dy) / (dinghy.speed * 4));
      if (days <= dinghy.maxDays) adj[p].push(q);
    });
  });

  const visited = new Set();
  const groups = [];
  Object.keys(ports).forEach(p => {
    if (!visited.has(p)) {
      const comp = [];
      const queue = [p];
      visited.add(p);
      while (queue.length) {
        const cur = queue.shift();
        comp.push(cur);
        adj[cur].forEach(nbr => {
          if (!visited.has(nbr)) { visited.add(nbr); queue.push(nbr); }
        });
      }
      groups.push(comp);
    }
  });

  let html = '<h2>🏝 Dinghy Group Membership</h2>';
  html += '<table><tr><th>Persona</th><th>Start Port</th><th>Dinghy Group</th><th>Starter Mission Target</th><th>Target Group</th><th>Reachable?</th></tr>';

  const personaPorts = {
    "english_william": "portRoyal",
    "spanish_elena": "havana",
    "french_luc": "martinique",
    "dutch_pieter": "curacao",
    "pirate_rosa": "tortuga",
  };
  const missionTargets = {
    "english_william": "kingston",
    "spanish_elena": "santiagoDeCuba",
    "french_luc": "portDePaix",
    "dutch_pieter": "stEustatius",
    "pirate_rosa": "nassau",
  };

  Object.entries(personaPorts).forEach(([persona, startPort]) => {
    const startGroup = groups.findIndex(g => g.includes(startPort)) + 1;
    const targetPort = missionTargets[persona];
    const targetGroup = groups.findIndex(g => g.includes(targetPort)) + 1;
    const ok = startGroup === targetGroup;
    html += `<tr><td>${persona}</td><td>${ports[startPort].name}</td><td>Group ${startGroup}</td><td>${ports[targetPort].name}</td><td>Group ${targetGroup}</td><td style="color:${ok ? '#4caf50' : '#f44336'}">${ok ? '✅' : '❌'}</td></tr>`;
  });
  html += '</table>';
  document.getElementById('dinghy-groups').innerHTML = html;
}


// ── Ship cost vs. mission income ────────────────────────────────
function shipCostVsMissions() {
  const shipList = Object.entries(ships)
    .filter(([k]) => k !== "dinghy")
    .sort((a, b) => a[1].cost - b[1].cost);
  const goldRanges = window.D.MISSION_GOLD_RANGES;

  function cumulativeGoldToFame(targetFame) {
    const tiers = [0, 50, 100, 150, 200];
    let gold = 0;
    let remaining = targetFame;
    for (let i = 0; i < tiers.length; i++) {
      const tierFame = tiers[i];
      const nextThreshold = tiers[i + 1] ?? targetFame;
      const missionsInTier = Math.min(remaining, nextThreshold - tierFame);
      if (missionsInTier <= 0) break;
      const avgGold = Math.round((goldRanges[i].medium[0] + goldRanges[i].medium[1]) / 2);
      gold += avgGold * missionsInTier;
      remaining -= missionsInTier;
    }
    return gold;
  }

  let html = '<h2>💰 Ship Cost vs. Medium Missions (cumulative fame progression)</h2>';
  html += '<table><tr><th>Ship</th><th>Cost</th><th>Fame Req.</th><th>Missions to unlock</th><th>Gold earned by unlock</th><th>Afford immediately?</th><th>Extra missions needed</th></tr>';

  shipList.forEach(([key, s]) => {
    const reqFame = s.requiredFame || 0;
    const missionsToUnlock = reqFame;
    const goldEarned = cumulativeGoldToFame(reqFame);
    const canAfford = goldEarned >= s.cost;
    const tier = reqFame >= 150 ? 4 : reqFame >= 100 ? 3 : reqFame >= 50 ? 2 : 0;
    const avgMedGold = Math.round((goldRanges[tier].medium[0] + goldRanges[tier].medium[1]) / 2);
    const extraMissions = canAfford ? 0 : Math.ceil((s.cost - goldEarned) / avgMedGold);

    html += `<tr><td>${s.name}</td><td>${s.cost}g</td><td>★ ${reqFame}</td><td>${missionsToUnlock}</td><td>${goldEarned}g</td><td style="color:${canAfford ? '#4caf50' : '#f44336'}">${canAfford ? '✅' : '❌'}</td><td>${extraMissions}</td></tr>`;
  });
  html += '</table>';
  document.getElementById('ship-cost-vs-missions').innerHTML = html;
}

// ── Daily running cost vs. mission income ────────────────────────
function dailyCostVsIncome() {
  const shipList = Object.entries(ships).sort((a, b) => a[1].cost - b[1].cost);
  const goldRanges = window.D.MISSION_GOLD_RANGES;
  const foodPrice = window.D.RESOURCES.food.basePrice;
  const waterPrice = window.D.RESOURCES.water.basePrice;
  const provisionCostPerUnit = foodPrice + waterPrice;

  let html = '<h2>📅 Days a Medium Mission Funds (wages + provisions)</h2>';
  html += '<table><tr><th>Ship</th><th>1/2 Crew</th><th>Daily cost (1/2)</th><th>Full Crew</th><th>Daily cost (full)</th><th>Days funded (1/2)</th><th>Days funded (full)</th></tr>';

  shipList.forEach(([key, s]) => {
    const halfCrew = Math.floor(s.maxCrew / 2);
    const fullCrew = s.maxCrew;
    const consum = c => Math.ceil(c / 10);
    const cost = c => c * 2 + consum(c) * provisionCostPerUnit;

    const halfCost = cost(halfCrew);
    const fullCost = cost(fullCrew);

    const reqFame = s.requiredFame || 0;
    const tier = reqFame >= 150 ? 4 : reqFame >= 100 ? 3 : reqFame >= 50 ? 2 : 0;
    const avgMediumGold = Math.round((goldRanges[tier].medium[0] + goldRanges[tier].medium[1]) / 2);

    const daysHalf = Math.floor(avgMediumGold / halfCost);
    const daysFull = Math.floor(avgMediumGold / fullCost);
    const flagHalf = daysHalf < 1.5 ? ' ⚠️' : '';
    const flagFull = daysFull < 1.5 ? ' ⚠️' : '';

    html += `<tr><td>${s.name}</td><td>${halfCrew}</td><td>${halfCost}g</td><td>${fullCrew}</td><td>${fullCost}g</td><td>${daysHalf}${flagHalf}</td><td>${daysFull}${flagFull}</td></tr>`;
  });
  html += '</table>';
  html += `<p>Provision cost = ${foodPrice}g (food) + ${waterPrice}g (water) = ${provisionCostPerUnit}g / unit. Gold = average <b>medium</b> mission reward.</p>`;
  html += '<p>⚠️ = single medium mission cannot fund 1.5 days of sailing.</p>';
  document.getElementById('daily-cost-vs-income').innerHTML = html;
}

// ── Hold capacity vs. profit per voyage ─────────────────────────
function holdProfitCheck() {
  const resources = window.D.RESOURCES;
  const availability = window.D.GOODS_AVAILABILITY;
  const shipList = Object.entries(ships).sort((a,b) => a[1].cost - b[1].cost);
  const tierQtyAvg = { always: 60, frequently: 30, sometimes: 14, rarely: 5, never: 0 };

  let html = '<h2>📦 Hold Profit per Voyage (average tier quantity)</h2>';
  html += '<table><tr><th>Ship</th><th>Best good</th><th>Avg profit/unit</th><th>Avg qty</th><th>Expected voyage profit</th><th>Cost</th><th>Profit ratio</th></tr>';

  shipList.forEach(([key, s]) => {
    const reachable = new Set();
    Object.keys(ports).forEach(homeKey => {
      getReachablePortKeys(homeKey, s).forEach(r => reachable.add(r));
    });

    let bestGood = null, bestExpectedProfit = -Infinity;

    Object.entries(resources).forEach(([good, res]) => {
      if (good === 'food' || good === 'water') return;
      let totalProfit = 0, totalQty = 0, count = 0;
      let minBuy = Infinity, maxSell = -Infinity;

      reachable.forEach(pk => {
        const tierArr = availability[pk];
        if (!tierArr) return;
        const colOrder = ["food","water","rum","sugar","timber","cloth","spices","silk","coffee","cocoa","weapons","tobacco","silver","slaves"];
        const idx = colOrder.indexOf(good);
        if (idx === -1) return;
        const tier = tierArr[idx] || 'never';
        if (tier === 'never') return;

        const avgQty = tierQtyAvg[tier] || 0;
        const variance = res.basePrice * res.variance;
        const lowMarket = res.basePrice - variance;
        const highMarket = res.basePrice + variance;
        const buy = Math.round(lowMarket * 1.10);
        const sell = Math.round(highMarket * 0.90);
        if (buy < minBuy) minBuy = buy;
        if (sell > maxSell) maxSell = sell;
        totalQty += avgQty;
        count++;
      });

      if (count > 0 && maxSell > minBuy) {
        const profitUnit = maxSell - minBuy;
        const avgQty = Math.round(totalQty / count);
        const expectedProfit = profitUnit * avgQty;
        if (expectedProfit > bestExpectedProfit) {
          bestExpectedProfit = expectedProfit;
          bestGood = {
            good, profitUnit, avgQty, expectedProfit,
            cost: Math.round((resources[good].basePrice - resources[good].basePrice * resources[good].variance) * 1.10) * avgQty
          };
        }
      }
    });

    if (bestGood) {
      const ratio = (bestGood.expectedProfit / (bestGood.cost || 1)).toFixed(2);
      html += `<tr><td>${s.name}</td><td>${bestGood.good}</td><td>${bestGood.profitUnit}g</td><td>${bestGood.avgQty}</td><td>${bestGood.expectedProfit}g</td><td>~${bestGood.cost}g</td><td>${ratio}</td></tr>`;
    } else {
      html += `<tr><td>${s.name}</td><td colspan="6">No profitable trade route found</td></tr>`;
    }
  });
  html += '</table>';
  html += '<p>Quantities use the midpoint of the tier range (always 60, frequently 30, sometimes 14, rarely 5).</p>';
  document.getElementById('hold-profit').innerHTML = html;
}

// -- trade profit per tier ----------------------

function tradeProfitByTier() {
  const ships = window.D.SHIPS;
  const margins = window.D.TRADE_MISSION_PROFIT_MARGINS;
  const goldRanges = window.D.MISSION_GOLD_RANGES;
  let html = '<h2>📦 Trade Mission Profit vs. Standard Mission</h2>';
  html += '<table><tr><th>Fame Tier</th><th>Example Ship</th><th>Hold Capacity</th><th>Trade Qty (low risk)</th><th>Avg Trade Gold</th><th>Avg Standard Gold (low)</th><th>Trade Premium</th></tr>';

  [0,1,2,3,4].forEach(tier => {
    const shipEntry = Object.entries(ships).find(([k,s]) => (s.requiredFame||0) >= (tier===4?150:tier===3?100:tier===2?50:tier===1?10:0));
    const ship = shipEntry ? shipEntry[1] : ships.sloop;
    const cap = ship.holdCapacity || 200;
    const qty = Math.max(3, Math.round(cap * 0.10));
    const avgGoodPrice = 50;
    const tradeGold = Math.round(avgGoodPrice * qty * (1 + (margins.low||0.60)) / 25) * 25;
    const standardGold = Math.round((goldRanges[tier].low[0] + goldRanges[tier].low[1]) / 2);

    html += `<tr><td>${tier}</td><td>${ship.name}</td><td>${cap}</td><td>${qty}</td><td>${tradeGold}g</td><td>${standardGold}g</td><td>${(tradeGold/standardGold).toFixed(1)}x</td></tr>`;
  });
  html += '</table>';
  document.getElementById('trade-profit').innerHTML = html;
}

function smuggleRiskReward() {
  const margins = window.D.SMUGGLE_PROFIT_MARGINS;
  const interceptChances = { low: 0.70, medium: 0.80, high: 0.90 };
  let html = '<h2>🚫 Smuggle Risk vs. Reward</h2>';
  html += '<table><tr><th>Risk</th><th>Profit Margin</th><th>Intercept Chance</th><th>Avg Profit (200 cap, tobacco 90g)</th><th>Expected Loss if Caught</th><th>Net Expected Value</th></tr>';

  ['low','medium','high'].forEach(risk => {
    const qty = Math.max(2, Math.round(200 * ({low:0.08,medium:0.18,high:0.35}[risk])));
    const margin = margins[risk] || 0.80;
    const baseCost = 90 * qty;
    const profit = Math.round(baseCost * (1 + margin) / 25) * 25 - baseCost;
    const intercept = interceptChances[risk];
    const lossIfCaught = baseCost + Math.round(baseCost * 0.5);
    const expectedValue = profit * (1 - intercept) - lossIfCaught * intercept;

    html += `<tr><td>${risk}</td><td>+${Math.round(margin*100)}%</td><td>${Math.round(intercept*100)}%</td><td>+${profit}g</td><td>-${lossIfCaught}g</td><td style="color:${expectedValue>=0?'#4caf50':'#f44336'}">${expectedValue>=0?'+':''}${Math.round(expectedValue)}g</td></tr>`;
  });
  html += '</table>';
  html += '<p>Expected value = profit × (1 - intercept) - loss × intercept. Assumes tobacco at 90g/unit, sloop hold (200 cap).</p>';
  document.getElementById('smuggle-risk').innerHTML = html;
}

function tradeQuantityScaling() {
  const ships = window.D.SHIPS;
  let html = '<h2>📏 Trade Quantity Scaling by Ship</h2>';
  html += '<table><tr><th>Ship</th><th>Hold</th><th>Low risk qty</th><th>Medium risk qty</th><th>High risk qty</th></tr>';

  Object.entries(ships).forEach(([key, s]) => {
    const cap = s.holdCapacity || 0;
    const low = Math.max(3, Math.round(cap * 0.10));
    const med = Math.max(3, Math.round(cap * 0.25));
    const high = Math.max(3, Math.round(cap * 0.50));
    html += `<tr><td>${s.name}</td><td>${cap}</td><td>${low}</td><td>${med}</td><td>${high}</td></tr>`;
  });
  html += '</table>';
  document.getElementById('trade-qty').innerHTML = html;
}

  html += '</table>';
  document.getElementById('goods-by-tier').innerHTML = html;
}


// ── Tavern morale vs. provisioning ───────────────────────────────
function moraleVsProvisioning() {
  let html = '<h2>🍻 Tavern Morale vs. Provisioning</h2>';
  html += '<table><tr><th>Crew</th><th>Drinks cost (+5 morale)</th><th>5‑day provisions (avoid −5 morale)</th><th>Drinks more expensive?</th></tr>';

// ── Enemy stats vs. player ships ────────────────────────────────
function enemyBalanceCheck() {
  const ranges = window.D.MISSION_ENEMY_RANGES;
  const riskFactors = { low: 0.0, medium: 0.5, high: 1.0, assault: 1.4 };

  const shipTier = {
    dinghy: 0, cutter: 0,
    sloop: 1,
    schooner: 2, merchantman: 2, brigantine: 2,
    corvette: 3, frigate: 3, fluyt: 3,
    galleon: 4, ship_of_the_line: 4
  };

  const tierShips = {};
  Object.entries(window.D.SHIPS).forEach(([key, s]) => {
    const tier = shipTier[key] ?? 0;
    if (!tierShips[tier]) tierShips[tier] = { best: s, worst: s, bestKey: key, worstKey: key };
    if (s.maxHull > tierShips[tier].best.maxHull) { tierShips[tier].best = s; tierShips[tier].bestKey = key; }
    if (s.maxHull < tierShips[tier].worst.maxHull) { tierShips[tier].worst = s; tierShips[tier].worstKey = key; }
  });

  let html = '<h2>⚔️ Enemy Balance vs. Player Ship</h2>';
  html += '<table><tr><th>Tier</th><th>Risk</th><th>Enemy Hull</th><th>Enemy Cannons</th><th>Enemy Crew</th><th>Best / Worst</th><th>Player Ship</th><th>Pl. Hull</th><th>Pl. Cannons</th><th>Pl. Crew</th><th>Viability</th></tr>';

  [0,1,2,3,4].forEach(tier => {
    const ts = tierShips[tier];
    if (!ts) return;
    Object.keys(riskFactors).forEach(risk => {
      const [hMin, hMax] = ranges.hull[tier];
      const hullSpan = hMax - hMin;
      const rf = riskFactors[risk];
      const expectedHull = Math.round(hMin + hullSpan * rf);
      const [cMin, cMax] = ranges.cannons[tier];
      const expectedCannons = Math.round(cMin + (cMax - cMin) * rf);
      const [crMin, crMax] = ranges.crew[tier];
      const expectedCrew = Math.round(crMin + (crMax - crMin) * rf);

      const viabilityLabel = (flags) => {
        if (flags.length === 0) return 'Combat';
        if (flags.includes('Hull') || flags.includes('Crew')) return 'Avoid';
        return 'Flee‑only';
      };

      const bestFlags = [];
      if (expectedHull > ts.best.maxHull * 1.5) bestFlags.push('Hull');
      if (expectedCannons > ts.best.cannons * 2) bestFlags.push('Cannons');
      if (expectedCrew > ts.best.maxCrew * 2) bestFlags.push('Crew');
      const bestViability = viabilityLabel(bestFlags);

      html += `<tr>
        <td>${tier}</td><td>${risk}</td>
        <td>${hMin}–${hMax}</td><td>${cMin}–${cMax}</td><td>${crMin}–${crMax}</td>
        <td>Best</td>
        <td>${ts.best.name}</td><td>${ts.best.maxHull}</td><td>${ts.best.cannons}</td><td>${ts.best.maxCrew}</td>
        <td style="color:${bestViability === 'Combat' ? '#4caf50' : bestViability === 'Flee‑only' ? '#ff9800' : '#f44336'}">${bestViability}</td>
      </tr>`;

      const worstFlags = [];
      if (expectedHull > ts.worst.maxHull * 1.5) worstFlags.push('Hull');
      if (expectedCannons > ts.worst.cannons * 2) worstFlags.push('Cannons');
      if (expectedCrew > ts.worst.maxCrew * 2) worstFlags.push('Crew');
      const worstViability = viabilityLabel(worstFlags);

      html += `<tr>
        <td>${tier}</td><td>${risk}</td>
        <td>${hMin}–${hMax}</td><td>${cMin}–${cMax}</td><td>${crMin}–${crMax}</td>
        <td>Worst</td>
        <td>${ts.worst.name}</td><td>${ts.worst.maxHull}</td><td>${ts.worst.cannons}</td><td>${ts.worst.maxCrew}</td>
        <td style="color:${worstViability === 'Combat' ? '#4caf50' : worstViability === 'Flee‑only' ? '#ff9800' : '#f44336'}">${worstViability}</td>
      </tr>`;
    });
  });
  html += '</table>';
  html += '<p>Viability labels: <b>Combat</b> = can fight evenly. <b>Flee‑only</b> = outgunned, evade recommended. <b>Avoid</b> = cannot survive this tier.</p>';
  document.getElementById('enemy-balance').innerHTML = html;
}

// ── Faction coverage ─────────────────────────────────────────────
function factionCoverage() {
  const factions = window.D.FACTIONS;
  const ports = window.D.PORTS;

  let html = '<h2>🏴 Faction Coverage (missions appear at non‑rival ports of other factions)</h2>';
  html += '<table><tr><th>Faction</th><th>Can appear at ports (other factions only)</th></tr>';

  Object.keys(factions).forEach(fk => {
    const hostPorts = [];
    Object.keys(ports).forEach(pk => {
      const portFaction = ports[pk].faction;
      if (portFaction === fk) return;
      const rivals = factions[portFaction]?.rivalFactions || [];
      if (!rivals.includes(fk)) hostPorts.push(ports[pk].name);
    });
    const ok = hostPorts.length > 0;
    html += `<tr><td>${fk}</td><td style="color:${ok ? '#4caf50' : '#f44336'}">${ok ? hostPorts.join(', ') : '❌ Nowhere!'}</td></tr>`;
  });
  html += '</table>';
  document.getElementById('faction-coverage').innerHTML = html;
}

// ── Time‑to‑kill (player vs. enemy) ──────────────────────────────
function timeToKill() {
  const ranges = window.D.MISSION_ENEMY_RANGES;
  const riskFactors = { low: 0.0, medium: 0.5, high: 1.0, assault: 1.4 };
  const shipTier = {
    dinghy:0, cutter:0, sloop:1, schooner:2, merchantman:2, brigantine:2,
    corvette:3, frigate:3, fluyt:3, galleon:4, ship_of_the_line:4
  };
  let bestPerTier = {};
  Object.entries(window.D.SHIPS).forEach(([k, s]) => {
    const t = shipTier[k] ?? 0;
    if (!bestPerTier[t] || s.maxHull > bestPerTier[t].maxHull) bestPerTier[t] = s;
  });

  let html = '<h2>⏱ Time to Kill (player broadside vs. enemy)</h2>';
  html += '<table><tr><th>Tier</th><th>Risk</th><th>Player Ship</th><th>Player Hull</th><th>Enemy Hull (avg)</th><th>Player Cannons</th><th>Enemy Cannons</th><th>Rounds to sink enemy</th></tr>';

  [0,1,2,3,4].forEach(tier => {
    const player = bestPerTier[tier];
    if (!player) return;
    Object.keys(riskFactors).forEach(risk => {
      const [hMin, hMax] = ranges.hull[tier];
      const rf = riskFactors[risk];
      const enemyHull = Math.round(hMin + (hMax - hMin) * rf);
      const [cMin, cMax] = ranges.cannons[tier];
      const enemyCannons = Math.round(cMin + (cMax - cMin) * rf);
      const avgDmg = Math.floor(player.cannons * (0.8 + 1.2) / 2 * 0.6);
      const rounds = Math.ceil(enemyHull / Math.max(1, avgDmg));
      const color = rounds > 8 ? '#f44336' : rounds < 3 ? '#ff9800' : '#4caf50';
      html += `<tr>
        <td>${tier}</td><td>${risk}</td><td>${player.name}</td><td>${player.maxHull}</td><td>${enemyHull}</td>
        <td>${player.cannons}</td><td>${enemyCannons}</td>
        <td style="color:${color}">${rounds}</td>
      </tr>`;
    });
  });
  html += '</table>';
  document.getElementById('time-to-kill').innerHTML = html;
}

  };

    if (!bestPerTier[t] || s.maxHull > bestPerTier[t].maxHull) bestPerTier[t] = s;
  });

  let html = '<h2>🩸 Crew Loss Rate (winning battle vs. best ship)</h2>';
  html += '<table><tr><th>Tier</th><th>Risk</th><th>Player Ship</th><th>Player Crew</th><th>Enemy Cannons (avg)</th><th>Crew lost per round (avg)</th><th>Est. rounds</th><th>Total crew lost</th><th>Loss %</th></tr>';

  [0,1,2,3,4].forEach(tier => {
    const player = bestPerTier[tier];
    if (!player) return;
    Object.keys(riskFactors).forEach(risk => {
      const [cMin, cMax] = ranges.cannons[tier];
      const rf = riskFactors[risk];
      const enemyCannons = Math.round(cMin + (cMax - cMin) * rf);
      const [hMin, hMax] = ranges.hull[tier];
      const enemyHull = Math.round(hMin + (hMax - hMin) * rf);
      const avgDmg = Math.floor(player.cannons * (0.8 + 1.2) / 2 * 0.6);
      const rounds = Math.ceil(enemyHull / Math.max(1, avgDmg));
      const crewLossPerRound = Math.round(enemyCannons * 0.3);
      const totalCrewLost = crewLossPerRound * rounds;
      const lossPct = Math.round((totalCrewLost / player.maxCrew) * 100);
      const color = lossPct > 50 ? '#f44336' : lossPct > 20 ? '#ff9800' : '#4caf50';

      html += `<tr>
        <td>${tier}</td><td>${risk}</td><td>${player.name}</td><td>${player.maxCrew}</td><td>${enemyCannons}</td>
        <td>${crewLossPerRound}</td><td>${rounds}</td><td>${totalCrewLost}</td>

      </tr>`;
    });
  });

  document.getElementById('crew-loss-rate').innerHTML = html;
}

// ── Combat Action Effectiveness ────────────────────────────────
function combatActionEffectiveness() {
  // Simulate average damage/effect for each action
  const actions = {
    broadside: {
      name: "Broadside",
      avgDamage: 1.0,
      avgCrewLoss: 0.8,
      accuracy: 0.6,
      description: "High damage, moderate crew loss"
    },
    precision: {
      name: "Precision",
      avgDamage: 1.5,
      avgCrewLoss: 0.2,
      accuracy: 0.7,
      description: "Very high damage, low crew loss"
    },
    grapple: {
      name: "Grapple",
      avgDamage: 0.0,
      avgCrewLoss: 0.0,
      accuracy: 0.5,
      instantWin: true,
      description: "Instant win on success, no damage"
    },
    evade: {
      name: "Evade",
      avgDamage: 0.0,
      avgCrewLoss: 0.0,
      accuracy: 0.4,
      flee: true,
      description: "Avoid combat entirely"
    }
  };

  let html = '<h2>⚔️ Combat Action Effectiveness</h2>';
  html += '<table><tr><th>Action</th><th>Avg Damage</th><th>Avg Crew Loss</th><th>Accuracy</th><th>Special Effect</th><th>Effectiveness Score</th><th>Balanced?</th></tr>';

  const scores = {};
  let allBalanced = true;

  Object.entries(actions).forEach(([key, action]) => {
    // Calculate effectiveness score
    const damageScore = action.avgDamage * action.accuracy;
    const crewScore = (1 - action.avgCrewLoss) * 0.5; // Lower crew loss is better
    const specialScore = action.instantWin ? 2.0 : action.flee ? 1.5 : 0;
    const score = damageScore + crewScore + specialScore;
    scores[key] = score;

    // Check if score is within a reasonable range (e.g., 1.0 to 2.0)
    const balanced = score >= 0.8 && score <= 2.2;
    if (!balanced) allBalanced = false;

    html += `<tr>
      <td>${action.name}</td>
      <td>${action.avgDamage.toFixed(1)}</td>
      <td>${action.avgCrewLoss.toFixed(1)}</td>
      <td>${(action.accuracy * 100).toFixed(0)}%</td>
      <td>${action.instantWin ? 'Instant Win' : action.flee ? 'Flee' : 'None'}</td>
      <td>${score.toFixed(2)}</td>
      <td style="color:${balanced ? '#4caf50' : '#f44336'}">${balanced ? '✅' : '❌'}</td>
    </tr>`;
  });

  html += '</table>';
  html += '<p>Effectiveness score = (damage × accuracy) + (1 - crew loss) + special effects. Scores should be roughly balanced (0.8–2.2).</p>';
  html += allBalanced
    ? '<p style="color:#4caf50">✅ All combat actions are balanced.</p>'
    : '<p style="color:#f44336">❌ Some combat actions are over/under-powered.</p>';
  document.getElementById('combat-actions').innerHTML = html;
}

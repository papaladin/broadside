 <svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">

      <defs>
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#3a4a6a" />
          <stop offset="40%"  stop-color="#7a6850" />
          <stop offset="75%"  stop-color="#d4a060" />
          <stop offset="100%" stop-color="#f0c878" />
        </linearGradient>

        <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#6890a0" />
          <stop offset="50%"  stop-color="#3a5868" />
          <stop offset="100%" stop-color="#1a2a3a" />
        </linearGradient>

        <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0%"   stop-color="#ffe8a0" stop-opacity="0.8" />
          <stop offset="50%"  stop-color="#ffc070" stop-opacity="0.3" />
          <stop offset="100%" stop-color="#ffc070" stop-opacity="0" />
        </radialGradient>

        <linearGradient id="vegGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#3a5025" />
          <stop offset="50%"  stop-color="#2a4018" />
          <stop offset="100%" stop-color="#1a2810" />
        </linearGradient>

        <radialGradient id="vegHighlight" cx="0.3" cy="0.3" r="0.7">
          <stop offset="0%"   stop-color="#5a7035" stop-opacity="0.5" />
          <stop offset="100%" stop-color="#5a7035" stop-opacity="0" />
        </radialGradient>
      </defs>

      <!-- SKY -->
      <rect x="0" y="0" width="1200" height="280" fill="url(#skyGrad)" />

      <!-- Sun -->
      <circle cx="280" cy="200" r="80" fill="url(#sunGlow)" />
      <circle cx="280" cy="200" r="22" fill="#fff0c0" opacity="0.95" />

      <!-- Distant haze (only background-land layer) -->
      <path d="M 0 250 Q 200 240 400 245 Q 600 250 800 240 Q 1000 230 1200 240 L 1200 280 L 0 280 Z"
            fill="#8a7060" opacity="0.35" />

      <!-- Cloud streaks -->
      <ellipse cx="500" cy="220" rx="180" ry="6" fill="#f0c890" opacity="0.4" />
      <ellipse cx="850" cy="195" rx="140" ry="4" fill="#f0c890" opacity="0.3" />

      <!-- MAIN LAND MASS -->
      <path d="M 580 285
               Q 620 280 650 270
               Q 700 240 740 200
               Q 790 165 830 155
               Q 900 145 970 165
               Q 1040 180 1100 195
               Q 1150 205 1200 210
               L 1200 400
               L 580 400
               Z"
            fill="#8a6a48" />

      <!-- Sun-side highlight on land -->
      <path d="M 740 200
               Q 790 165 830 155
               Q 900 145 970 165
               L 970 180
               Q 900 158 830 168
               Q 790 178 740 220
               Z"
            fill="#a8825c" opacity="0.6" />

      <!-- Shadow on water-facing side of land -->
      <path d="M 580 285
               Q 620 280 650 270
               Q 700 240 740 200
               L 740 280
               L 580 290
               Z"
            fill="#5a4030" opacity="0.65" />

      <!-- VEGETATION: jungle mass on right (kept as-is) -->
      <path d="M 980 175
               Q 1010 165 1040 168
               Q 1075 165 1105 175
               Q 1145 180 1175 195
               Q 1195 205 1200 215
               L 1200 285
               L 980 240
               Q 970 215 975 195
               Z"
            fill="url(#vegGrad)" />

      <path d="M 980 195
               Q 1010 180 1050 182
               Q 1080 185 1100 195
               L 1080 215
               Q 1040 205 1010 215
               Q 990 218 980 215
               Z"
            fill="url(#vegHighlight)" />

      <path d="M 1100 215
               Q 1130 220 1160 235
               Q 1180 250 1190 270
               L 1200 280
               L 1200 320
               L 1130 290
               Z"
            fill="#1a2810" opacity="0.7" />

      <path d="M 980 175
               Q 990 168 1000 172
               Q 1010 166 1022 170
               Q 1035 164 1048 170
               Q 1060 166 1075 172
               Q 1090 168 1105 175"
            fill="none" stroke="#2a4018" stroke-width="2" opacity="0.7" />

      <!-- Small green patch nearer city (water-side) -->
      <path d="M 645 275
               Q 660 268 680 270
               Q 700 268 715 274
               L 720 286
               L 640 286
               Z"
            fill="url(#vegGrad)" opacity="0.85" />

      <!-- ═══════════════════════════════════════════════════════
           CITY BUILDINGS - all single tone #3a2818
           Render order: HIGHEST hill positions FIRST, then progressively lower.
           Organic irregular placement (v1-style), denser than v1.
           ═══════════════════════════════════════════════════════ -->

      <!-- ========== HIGHEST: Cathedral focal point ========== -->
      <g fill="#3a2818">
        <rect x="880" y="125" width="40" height="32" />
        <polygon points="877,125 923,125 900,114" fill="#5a2818" />
        <!-- Bell tower -->
        <rect x="901" y="92" width="14" height="35" />
        <polygon points="899,92 917,92 908,80" fill="#5a2818" />
      </g>
      <!-- Cross atop bell tower -->
      <rect x="907" y="68" width="2" height="14" fill="#2a1808" />
      <rect x="902" y="72" width="12" height="2" fill="#2a1808" />

      <!-- ========== TIER 1: Summit area (highest positions, drawn first) ========== -->
      <!-- LEFT of cathedral: small cluster of summit buildings -->
      <g fill="#3a2818">
        <rect x="852" y="135" width="14" height="22" />
        <polygon points="850,135 868,135 859,129" fill="#5a2818" />

        <rect x="864" y="142" width="11" height="18" />
        <polygon points="862,142 877,142 869,137" fill="#5a2818" />

        <rect x="838" y="140" width="13" height="20" />

        <rect x="828" y="146" width="11" height="15" />
      </g>

      <!-- ========== TIER 2: Upper hill (mid-summit, drawn after tier 1) ========== -->
      <g fill="#3a2818">
        <rect x="820" y="155" width="14" height="22" />
        <rect x="811" y="160" width="11" height="20" />
        <rect x="797" y="162" width="13" height="24" />
        <rect x="787" y="165" width="11" height="22" />
        <rect x="843" y="158" width="12" height="20" />
        <rect x="855" y="156" width="14" height="24" />
        <rect x="867" y="160" width="10" height="22" />
        <rect x="878" y="158" width="13" height="22" />
        <rect x="890" y="162" width="11" height="20" />
        <rect x="911" y="160" width="13" height="22" />
        <rect x="924" y="162" width="11" height="20" />
        <rect x="934" y="165" width="14" height="22" />
        <rect x="773" y="170" width="12" height="18" />
      </g>

      <!-- Sparse roofs for upper hill (terracotta accent) -->
      <g fill="#7a3520" opacity="0.7">
        <polygon points="820,155 834,155 827,150" />
        <polygon points="855,156 869,156 862,150" />
        <polygon points="878,158 891,158 884,153" />
        <polygon points="911,160 924,160 917,154" />
        <polygon points="934,165 948,165 941,159" />
      </g>

      <!-- ========== TIER 3: Mid hill (drawn after tier 2) ========== -->
      <g fill="#3a2818">
        <rect x="765" y="183" width="15" height="28" />
        <rect x="780" y="178" width="13" height="30" />
        <rect x="792" y="180" width="14" height="28" />
        <rect x="805" y="175" width="12" height="32" />
        <rect x="816" y="180" width="14" height="28" />
        <rect x="829" y="174" width="13" height="32" />
        <rect x="841" y="178" width="14" height="30" />
        <rect x="854" y="173" width="12" height="32" />
        <rect x="865" y="178" width="14" height="30" />
        <rect x="878" y="175" width="13" height="32" />
        <rect x="890" y="178" width="14" height="30" />
        <rect x="903" y="180" width="12" height="28" />
        <rect x="914" y="175" width="14" height="32" />
        <rect x="927" y="180" width="13" height="28" />
        <rect x="939" y="183" width="14" height="26" />
        <rect x="952" y="186" width="11" height="22" />
        <rect x="962" y="188" width="13" height="20" />

        <!-- Tucked smaller buildings -->
        <rect x="775" y="195" width="9" height="14" />
        <rect x="800" y="195" width="10" height="13" />
        <rect x="848" y="195" width="9" height="12" />
        <rect x="897" y="195" width="9" height="13" />
        <rect x="935" y="195" width="9" height="13" />
      </g>

      <!-- Sparse roofs for mid hill -->
      <g fill="#7a3520" opacity="0.7">
        <polygon points="780,178 793,178 786,173" />
        <polygon points="805,175 817,175 811,170" />
        <polygon points="829,174 842,174 835,169" />
        <polygon points="854,173 866,173 860,168" />
        <polygon points="878,175 891,175 884,170" />
        <polygon points="914,175 928,175 921,170" />
      </g>

      <!-- ========== TIER 4: Lower hill (closest to water, drawn last) ========== -->
      <g fill="#3a2818">
        <rect x="757" y="202" width="14" height="28" />
        <rect x="772" y="200" width="12" height="30" />
        <rect x="785" y="205" width="14" height="26" />
        <rect x="800" y="200" width="13" height="30" />
        <rect x="813" y="204" width="14" height="28" />
        <rect x="827" y="200" width="12" height="30" />
        <rect x="839" y="205" width="14" height="28" />
        <rect x="853" y="200" width="13" height="30" />
        <rect x="865" y="204" width="14" height="28" />
        <rect x="879" y="200" width="12" height="32" />
        <rect x="892" y="205" width="14" height="28" />
        <rect x="906" y="203" width="13" height="30" />
        <rect x="919" y="206" width="14" height="26" />
        <rect x="933" y="208" width="12" height="24" />
        <rect x="945" y="210" width="13" height="22" />

        <!-- Smaller tucked variations near water -->
        <rect x="765" y="217" width="10" height="15" />
        <rect x="793" y="220" width="9" height="13" />
        <rect x="822" y="218" width="10" height="14" />
        <rect x="849" y="220" width="9" height="13" />
        <rect x="875" y="220" width="9" height="14" />
        <rect x="901" y="220" width="10" height="13" />
        <rect x="929" y="218" width="9" height="14" />
      </g>

      <!-- Sparse roofs for lower hill -->
      <g fill="#7a3520" opacity="0.7">
        <polygon points="772,200 784,200 778,195" />
        <polygon points="800,200 813,200 806,195" />
        <polygon points="827,200 839,200 833,195" />
        <polygon points="853,200 866,200 859,195" />
        <polygon points="879,200 891,200 885,195" />
        <polygon points="906,203 919,203 912,198" />
      </g>

      <!-- ── FORTRESS at water edge ────────────────────────── -->
      <g fill="#3a2818">
        <!-- Main fort wall -->
        <rect x="685" y="232" width="95" height="42" />
        <!-- Crenellations across top -->
        <rect x="685" y="226" width="9" height="8" />
        <rect x="700" y="226" width="9" height="8" />
        <rect x="715" y="226" width="9" height="8" />
        <rect x="730" y="226" width="9" height="8" />
        <rect x="745" y="226" width="9" height="8" />
        <rect x="760" y="226" width="9" height="8" />
        <rect x="775" y="226" width="9" height="8" />

        <!-- Keep tower at the right corner -->
        <rect x="765" y="208" width="18" height="32" />
        <rect x="765" y="200" width="5" height="8" />
        <rect x="773" y="200" width="5" height="8" />
      </g>

      <!-- Flag on keep -->
      <line x1="774" y1="200" x2="774" y2="185" stroke="#3a2818" stroke-width="1.2" />
      <rect x="774" y="185" width="12" height="7" fill="#a08040" opacity="0.85" />

      <!-- ── STEEPER RAMPART SECTIONS climbing the hill ────── -->
      <!-- Section 1: steeper angle from fortress upward -->
      <g fill="#3a2818">
        <polygon points="780,240 820,210 820,228 780,260" />
        <!-- Crenellations along the steep top edge -->
        <polygon points="780,240 790,232 790,240 780,247" />
        <polygon points="795,229 805,221 805,229 795,237" />
        <polygon points="810,218 820,210 820,218 810,226" />
      </g>

      <!-- Section 2: continues even higher and steeper -->
      <g fill="#3a2818">
        <polygon points="820,210 855,185 855,202 820,228" />
        <polygon points="820,210 829,204 829,212 820,219" />
        <polygon points="834,200 843,194 843,202 834,210" />
        <polygon points="848,191 855,185 855,193 848,201" />
      </g>

      <!-- ── SHORELINE / BEACH ─────────────────────────────── -->
      <path d="M 580 285
               Q 620 282 650 280
               Q 700 280 740 290
               L 740 297
               Q 700 290 650 290
               Q 620 292 580 295
               Z"
            fill="#c4a070" opacity="0.85" />

      <!-- ── SEA ────────────────────────────────────────────── -->
      <rect x="0" y="280" width="1200" height="120" fill="url(#seaGrad)" />

      <!-- Sun reflection on water -->
      <ellipse cx="280" cy="300" rx="180" ry="14" fill="#f0c870" opacity="0.25" />
      <ellipse cx="280" cy="310" rx="140" ry="6" fill="#f0c870" opacity="0.15" />

      <!-- Wave lines -->
      <g stroke="#8aa8b0" stroke-width="0.6" opacity="0.4" fill="none">
        <path d="M 50 320 Q 100 318 150 320 Q 200 322 250 320" />
        <path d="M 400 340 Q 450 338 500 340 Q 550 342 600 340" />
        <path d="M 100 360 Q 160 358 220 360 Q 280 362 340 360" />
        <path d="M 500 370 Q 560 368 620 370 Q 680 372 740 370" />
      </g>

      <!-- Distant ships -->
      <g>
        <g transform="translate(420 295)">
          <ellipse cx="0" cy="0" rx="14" ry="3" fill="#2a1808" />
          <line x1="-2" y1="-1" x2="-2" y2="-18" stroke="#2a1808" stroke-width="1.2" />
          <line x1="4" y1="-1" x2="4" y2="-22" stroke="#2a1808" stroke-width="1.2" />
          <polygon points="-4,-18 -4,-6 4,-6 4,-22" fill="#5a4530" opacity="0.85" />
          <polygon points="-2,-14 -2,-4 8,-4 8,-18" fill="#5a4530" opacity="0.85" />
        </g>
        <g transform="translate(180 335)">
          <ellipse cx="0" cy="0" rx="22" ry="4" fill="#2a1808" />
          <line x1="-3" y1="-1" x2="-3" y2="-26" stroke="#2a1808" stroke-width="1.5" />
          <line x1="6" y1="-1" x2="6" y2="-32" stroke="#2a1808" stroke-width="1.5" />
          <polygon points="-7,-26 -7,-8 6,-8 6,-32" fill="#5a4530" />
          <polygon points="-3,-22 -3,-6 13,-6 13,-26" fill="#5a4530" />
        </g>
        <g transform="translate(680 310)">
          <ellipse cx="0" cy="0" rx="10" ry="2" fill="#2a1808" />
          <line x1="0" y1="-1" x2="0" y2="-14" stroke="#2a1808" stroke-width="1" />
          <polygon points="-3,-13 -3,-4 4,-4 4,-14" fill="#5a4530" opacity="0.8" />
        </g>
      </g>

    </svg>
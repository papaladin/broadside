<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Broadside – Caribbean 1695</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07111e; }
    #root { min-height: 100vh; display: flex; flex-direction: column; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #07111e; }
    ::-webkit-scrollbar-thumb { background: #1c3450; border-radius: 2px; }
  
    /* QM popup slide-in animation */
  @keyframes qmSlideIn {
    from { transform: translateX(-50%) translateY(100%); opacity: 0; }
    to   { transform: translateX(-50%) translateY(0);    opacity: 1; }
    
  }
  /* Button unlock pulse animation */
  .btn-pulse {
    animation: btnPulse 0.5s ease-in-out 3;
  }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201, 170, 110, 0.6); }
    50% { box-shadow: 0 0 12px 6px rgba(201, 170, 110, 0.6); }
  }
  
    /* UI juice keyframes */
     /* UI juice keyframes */
  @keyframes flashGreen {
    0%   {
      color: #7ab868;
      text-shadow: 0 0 18px #7ab868, 0 0 36px #7ab868, 0 0 8px #fff;
    }
    100% {
      color: inherit;
      text-shadow: none;
    }
  }
  @keyframes flashRed {
    0%   {
      color: #d06a58;
      text-shadow: 0 0 18px #d06a58, 0 0 36px #d06a58, 0 0 8px #fff;
    }
    100% {
      color: inherit;
      text-shadow: none;
    }
  }
  @keyframes flashGold {
    0%   { color: #dfc080; text-shadow: 0 0 18px #dfc080; }
    100% { color: inherit; text-shadow: none; }
  }
  @keyframes flashBlue {
    0%   { color: #6a9aba; text-shadow: 0 0 18px #6a9aba; }
    100% { color: inherit; text-shadow: none; }
  }
  @keyframes flashPurple {
    0%   { color: #9a6aaa; text-shadow: 0 0 18px #9a6aaa; }
    100% { color: inherit; text-shadow: none; }
  }
  @keyframes pulseBar {
    0%   { filter: brightness(1.8); }
    100% { filter: brightness(1);   }
  }
  .flash-green,
  .flash-red,
  .flash-gold,
  .flash-blue,
  .flash-purple {
    display: inline-block;
  }
  .flash-green  { animation: flashGreen 0.8s ease-out; }
  .flash-red    { animation: flashRed   0.8s ease-out; }
  .flash-gold   { animation: flashGold  0.8s ease-out; }
  .flash-blue   { animation: flashBlue  0.8s ease-out; }
  .flash-purple { animation: flashPurple 0.8s ease-out; }
  .bar-pulse    { animation: pulseBar   0.5s ease-out; }

/* Combat action buttons – hover glow & click pulse */
.combat-btn {
  transition: transform 0.12s ease, box-shadow 0.12s ease;
}
.combat-btn:hover {
  transform: scale(1.03);
  box-shadow: 0 0 14px rgba(201, 170, 110, 0.35);
}
.combat-btn.clicked {
  transform: scale(0.95);
}

/* Global button hover glow + click pulse */
.btn-hover-glow {
  transition: transform 0.12s ease, box-shadow 0.12s ease;
}
.btn-hover-glow:hover:not(:disabled) {
  transform: scale(1.03);
  box-shadow: 0 0 14px var(--btn-glow, rgba(201, 170, 110, 0.4));
}
.btn-click-pulse:active:not(:disabled) {
  transform: scale(0.95);
  transition: transform 0.08s ease;
}

@keyframes missBorderFlash {
  0%   { border-color: #d06a58; box-shadow: 0 0 8px #d06a58; }
  100% { border-color: inherit; box-shadow: none; }
}
.miss-flash-border {
  animation: missBorderFlash 0.6s ease-out;
}
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Dependencies : must load before Babel scripts -->
<script src="https://unpkg.com/react@18.2.0/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>

  <!--
    Game files : loaded in strict dependency order.
    Each file exposes a window namespace (window.D, window.L, etc.)
    that subsequent files consume. Babel standalone fetches
    each src synchronously before moving to the next.

    data.js   → window.D  (pure constants, no deps)
    logic.js  → window.L  (pure functions, uses window.D)
    engine_*.js → window.E  (reducer + actions, uses window.D + window.L)
    ui.jsx    → window.UI (React primitives, no game knowledge)
    screens_*.jsx → window.S (all screens, uses window.D/L/E/UI)
    App.jsx   → root render (uses all of the above)

    NOTE: requires a local server (VSCode Live Server, Python http.server,
    or GitHub Pages). Will NOT work opened directly as file:// due to
    browser CORS restrictions on XHR to local files.
  -->
<script type="text/babel" data-presets="react" src="data.js"></script>
<script type="text/babel" data-presets="react" src="data_text.js"></script>
<script type="text/babel" data-presets="react" src="ship-sprite.js"></script>
<script type="text/babel" data-presets="react" src="logic.js"></script>
<script type="text/babel" data-presets="react"  src="storage.js"></script>         
<script type="text/babel" data-presets="react" src="generators.js"></script>
<script type="text/babel" data-presets="react" src="engine_core.js"></script>
<script type="text/babel" data-presets="react" src="engine_port.js"></script>
<script type="text/babel" data-presets="react" src="engine_voyage.js"></script>
<script type="text/babel" data-presets="react" src="engine_combat.js"></script>
<script type="text/babel" data-presets="react" src="engine_onboarding.js"></script>
<script type="text/babel" data-presets="react" src="engine_career.js"></script>
<script type="text/babel" data-presets="react" src="engine_scripted.js"></script>
<script type="text/babel" data-presets="react" src="ui.jsx"></script>
<script type="text/babel" data-presets="react" src="icons.jsx"></script> 
<script type="text/babel" data-presets="react" src="screens_core.jsx"></script>
<script type="text/babel" data-presets="react" src="screens_port.jsx"></script>
<script type="text/babel" data-presets="react" src="screens_shipyard.jsx"></script>
<script type="text/babel" data-presets="react" src="screens_crew.jsx"></script>
<script type="text/babel" data-presets="react" src="screens_market.jsx"></script>
<script type="text/babel" data-presets="react" src="screens_voyage.jsx"></script>
<script type="text/babel" data-presets="react" src="screens_combat.jsx"></script>
<script type="text/babel" data-presets="react" src="App.jsx"></script>
</body>
</html>
